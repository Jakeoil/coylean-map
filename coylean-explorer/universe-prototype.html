<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Coylean Universe Prototype</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #333;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            .layout-body {
                flex: 1;
                display: flex;
                min-height: 0;
            }
            .breadcrumb {
                background: #fff;
                border-bottom: 1px solid #ddd;
                padding: 10px 20px;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.85em;
                flex-shrink: 0;
            }
            .breadcrumb a {
                color: #1f6feb;
                text-decoration: none;
            }
            .breadcrumb a:hover { text-decoration: underline; }
            .breadcrumb .sep { color: #aaa; }
            .breadcrumb .current {
                color: #444;
                font-weight: 600;
            }

            .sidebar {
                width: 320px;
                min-width: 320px;
                padding: 20px;
                background: #fff;
                border-right: 1px solid #ddd;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            h1 {
                font-size: 1.2em;
                color: #222;
            }
            h2 {
                font-size: 0.85em;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .call-sig {
                font-family: monospace;
                font-size: 0.9em;
                color: #2a7a3a;
                padding: 8px 12px;
                background: #f5f5f5;
                border-radius: 6px;
                border: 1px solid #ccc;
                white-space: pre-wrap;
            }

            /* Cross formation for N/S/W/E extents */
            .extent-cross {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: auto auto auto;
                gap: 6px;
                justify-items: center;
                align-items: center;
            }
            .extent-cross .slot-n { grid-column: 2; grid-row: 1; }
            .extent-cross .slot-w { grid-column: 1; grid-row: 2; }
            .extent-cross .slot-c { grid-column: 2; grid-row: 2; }
            .extent-cross .slot-e { grid-column: 3; grid-row: 2; }
            .extent-cross .slot-s { grid-column: 2; grid-row: 3; }

            .control {
                display: flex;
                flex-direction: column;
                gap: 2px;
                align-items: center;
            }
            .control label {
                font-size: 0.72em;
                color: #666;
            }
            .control input {
                width: 64px;
                padding: 4px 8px;
                background: #f5f5f5;
                border: 1px solid #ccc;
                color: #333;
                border-radius: 4px;
                font-size: 0.9em;
                text-align: center;
            }
            .slot-c .origin-marker {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #bc8cff;
                border: 1px solid #7c5cb0;
            }

            .init-row {
                display: flex;
                gap: 10px;
                justify-content: center;
            }

            .main {
                flex: 1;
                overflow: hidden;
                padding: 0;
                background: #fff;
            }

            #diagram {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
                cursor: grab;
                background: #fff;
            }
            #diagram.dragging { cursor: grabbing; }
            .diamond { stroke-width: 1; }
            .coord-label {
                font-size: 11px;
                font-family: monospace;
                pointer-events: none;
                text-anchor: middle;
                fill: #888;
            }
            .origin-line {
                stroke: #bc8cff;
                stroke-width: 1;
                stroke-dasharray: 3 3;
            }

            /* Hover inspector tooltip */
            #tooltip {
                position: fixed;
                pointer-events: none;
                background: rgba(30, 30, 30, 0.92);
                color: #eee;
                font-family: monospace;
                font-size: 11px;
                line-height: 1.45;
                padding: 8px 10px;
                border-radius: 6px;
                border: 1px solid #444;
                max-width: 320px;
                z-index: 1000;
                display: none;
                white-space: pre;
            }
            #tooltip .t-title {
                font-weight: 600;
                margin-bottom: 4px;
            }
            #tooltip .t-mismatch {
                color: #ff8c6a;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <nav class="breadcrumb">
            <a href="index.html">Index</a>
            <span class="sep">›</span>
            <a href="basic-propagation-prototype.html">Basic Propagation</a>
            <span class="sep">›</span>
            <a href="exploration-prototype.html">Exploration Prototype</a>
            <span class="sep">›</span>
            <a href="universe-quadrants-prototype.html">Universe-Quadrants</a>
            <span class="sep">›</span>
            <a href="universal-propagate-prototype.html">Universal Propagate Prototype</a>
            <span class="sep">›</span>
            <a href="universe-prototype.html" class="current">Universe Prototype</a>
        </nav>
        <div class="layout-body">
        <div class="sidebar">
            <h1>Universe Prototype</h1>

            <div class="call-sig" id="call-sig"></div>

            <h2>Extents</h2>
            <div class="extent-cross">
                <div class="slot-n control">
                    <label>north</label>
                    <input type="number" id="northExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-w control">
                    <label>west</label>
                    <input type="number" id="westExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-c" title="origin">
                    <div class="origin-marker"></div>
                </div>
                <div class="slot-e control">
                    <label>east</label>
                    <input type="number" id="eastExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-s control">
                    <label>south</label>
                    <input type="number" id="southExtent" value="4" min="1" max="32" />
                </div>
            </div>

            <h2>Init</h2>
            <div class="init-row">
                <div class="control">
                    <label>hInitCol</label>
                    <input type="number" id="hInitCol" value="1" min="-20" max="20" />
                </div>
                <div class="control">
                    <label>vInitRow</label>
                    <input type="number" id="vInitRow" value="1" min="-20" max="20" />
                </div>
            </div>

            <h2>Info</h2>
            <div class="call-sig" id="info"></div>
        </div>

        <div class="main">
            <svg id="diagram"></svg>
        </div>
        </div>
        <div id="tooltip"></div>

        <script type="module">
            import { Universe, pri } from "./coylean-core.js";
            import { attachSvgPanZoom } from "./src/display/svg-pan-zoom.js";

            const S = 32;
            const D = S / 2;
            const PAD = 40;

            const svg = document.getElementById("diagram");
            const callSig = document.getElementById("call-sig");
            const info = document.getElementById("info");

            const inputs = {
                northExtent: document.getElementById("northExtent"),
                southExtent: document.getElementById("southExtent"),
                westExtent:  document.getElementById("westExtent"),
                eastExtent:  document.getElementById("eastExtent"),
                hInitCol:    document.getElementById("hInitCol"),
                vInitRow:    document.getElementById("vInitRow"),
            };

            for (const inp of Object.values(inputs)) {
                inp.addEventListener("input", render);
            }

            function svgEl(tag, attrs) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
                return el;
            }

            function diamondPts(cx, cy) {
                return `${cx},${cy - D} ${cx + D},${cy} ${cx},${cy + D} ${cx - D},${cy}`;
            }

            function downPos(i, j) { return [PAD + (i + 0.5) * S, PAD + j * S]; }
            function rightPos(i, j) { return [PAD + i * S, PAD + (j + 0.5) * S]; }

            const ARR_MARGIN = 1.5;
            const ARR_SW = 1.25;
            const ARR_HL = 6;
            const ARR_HW = 3;
            const ARR_ND = 2;

            function downArrowPath(cx, cy, doubleHeaded) {
                const t = cy - D + ARR_MARGIN;
                const b = cy + D - ARR_MARGIN;
                if (doubleHeaded) {
                    return `M${cx},${t} L${cx + ARR_HW},${t + ARR_HL} ${cx + ARR_SW},${t + ARR_HL - ARR_ND} ${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND} ${cx - ARR_SW},${t + ARR_HL - ARR_ND} ${cx - ARR_HW},${t + ARR_HL}Z`;
                }
                return `M${cx - ARR_SW},${t} A${ARR_SW},${ARR_SW} 0 0 1 ${cx + ARR_SW},${t} L${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND}Z`;
            }

            function rightArrowPath(cx, cy, doubleHeaded) {
                const l = cx - D + ARR_MARGIN;
                const r = cx + D - ARR_MARGIN;
                if (doubleHeaded) {
                    return `M${l},${cy} L${l + ARR_HL},${cy - ARR_HW} ${l + ARR_HL - ARR_ND},${cy - ARR_SW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW} ${r - ARR_HL},${cy - ARR_HW} ${r},${cy} ${r - ARR_HL},${cy + ARR_HW} ${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${l + ARR_HL - ARR_ND},${cy + ARR_SW} ${l + ARR_HL},${cy + ARR_HW}Z`;
                }
                return `M${l},${cy - ARR_SW} A${ARR_SW},${ARR_SW} 0 0 0 ${l},${cy + ARR_SW} L${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${r - ARR_HL},${cy + ARR_HW} ${r},${cy} ${r - ARR_HL},${cy - ARR_HW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW}Z`;
            }

            // ── Hover inspector ──
            // currentUniverse holds the latest Universe so event delegation handlers
            // can read matrices/priorities without re-invoking Universe.create.
            let currentUniverse = null;
            const tooltip = document.getElementById("tooltip");

            function formatTooltip(el) {
                const u = currentUniverse;
                if (!u) return null;
                const source = el.dataset.source;
                if (source !== "down" && source !== "right") return null;
                const i = +el.dataset.i;
                const j = +el.dataset.j;

                // source "down"  → downMatrix[j][i]  (global row = j, global col = i)
                // source "right" → rightMatrix[i][j] (global col = i, global row = j)
                const row = j;
                const col = i;
                const val = source === "down" ? u.downMatrix[j][i] : u.rightMatrix[i][j];

                const cachedCol = u.colPriority[col];
                const cachedRow = u.rowPriority[row];
                const directCol = pri((col - u.originCol) + u.hInitCol);
                const directRow = pri((row - u.originRow) + u.vInitRow);
                const colMismatch = cachedCol !== directCol;
                const rowMismatch = cachedRow !== directRow;

                const matrixRef =
                    source === "down"
                        ? `downMatrix[${j}][${i}]`
                        : `rightMatrix[${i}][${j}]`;
                const mark = (ok) => (ok ? "" : ' <span class="t-mismatch">≠</span>');

                return `<div class="t-title">${source === "down" ? "Down" : "Right"} diamond</div>` +
                    `${matrixRef} = ${val}\n` +
                    `global: row=${row} col=${col}\n` +
                    `origin: row=${u.originRow} col=${u.originCol}\n` +
                    `hInitCol=${u.hInitCol} vInitRow=${u.vInitRow}\n` +
                    `colPriority[${col}] cached=${cachedCol}` +
                    `  direct=pri((${col}-${u.originCol})+${u.hInitCol})=${directCol}${mark(!colMismatch)}\n` +
                    `rowPriority[${row}] cached=${cachedRow}` +
                    `  direct=pri((${row}-${u.originRow})+${u.vInitRow})=${directRow}${mark(!rowMismatch)}`;
            }

            function positionTooltip(clientX, clientY) {
                const pad = 12;
                const rect = tooltip.getBoundingClientRect();
                let x = clientX + pad;
                let y = clientY + pad;
                if (x + rect.width > window.innerWidth)
                    x = clientX - rect.width - pad;
                if (y + rect.height > window.innerHeight)
                    y = clientY - rect.height - pad;
                tooltip.style.left = x + "px";
                tooltip.style.top = y + "px";
            }

            function hideTooltip() {
                tooltip.style.display = "none";
            }

            // Delegate hover to the svg; filter on data-source attribute.
            svg.addEventListener("mouseover", (e) => {
                if (svg.classList.contains("dragging")) return;
                const el = e.target;
                if (!el || !el.dataset || !el.dataset.source) return;
                const html = formatTooltip(el);
                if (!html) return;
                tooltip.innerHTML = html;
                tooltip.style.display = "block";
                positionTooltip(e.clientX, e.clientY);
            });
            svg.addEventListener("mousemove", (e) => {
                if (svg.classList.contains("dragging")) {
                    hideTooltip();
                    return;
                }
                if (tooltip.style.display === "block") {
                    positionTooltip(e.clientX, e.clientY);
                }
            });
            svg.addEventListener("mouseout", (e) => {
                const el = e.target;
                if (!el || !el.dataset || !el.dataset.source) return;
                hideTooltip();
            });
            svg.addEventListener("mouseleave", hideTooltip);

            function render() {
                const northExtent = +inputs.northExtent.value;
                const southExtent = +inputs.southExtent.value;
                const westExtent  = +inputs.westExtent.value;
                const eastExtent  = +inputs.eastExtent.value;
                const hInitCol    = +inputs.hInitCol.value;
                const vInitRow    = +inputs.vInitRow.value;

                callSig.textContent =
                    `Universe.create({\n` +
                    `  northExtent: ${northExtent},\n` +
                    `  southExtent: ${southExtent},\n` +
                    `  westExtent:  ${westExtent},\n` +
                    `  eastExtent:  ${eastExtent},\n` +
                    `  hInitCol:    ${hInitCol},\n` +
                    `  vInitRow:    ${vInitRow},\n` +
                    `})`;

                const u = Universe.create({
                    northExtent, southExtent, westExtent, eastExtent,
                    hInitCol, vInitRow,
                });
                currentUniverse = u;
                hideTooltip();

                const nR = northExtent + southExtent - 1;
                const nC = westExtent + eastExtent - 1;

                info.textContent =
                    `rows: ${nR}  cols: ${nC}\n` +
                    `origin: r${u.originRow} c${u.originCol}`;

                const w = 2 * PAD + nC * S;
                const h = 2 * PAD + nR * S;
                svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
                svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

                // All drawn content lives inside a transform group controlled by the pan/zoom helper.
                let viewportGroup = svg.querySelector("g.viewport");
                if (!viewportGroup) {
                    viewportGroup = svgEl("g", { class: "viewport" });
                    svg.appendChild(viewportGroup);
                }
                viewportGroup.innerHTML = "";
                const draw = (tag, attrs) => {
                    const el = svgEl(tag, attrs);
                    viewportGroup.appendChild(el);
                    return el;
                };

                const dm = u.downMatrix;
                const rm = u.rightMatrix;

                // Origin crosshair
                const [ox] = [PAD + u.originCol * S + S / 2];
                const [oy] = [PAD + u.originRow * S + S / 2];
                draw("line", {
                    x1: ox, y1: PAD, x2: ox, y2: PAD + nR * S, class: "origin-line",
                });
                draw("line", {
                    x1: PAD, y1: oy, x2: PAD + nC * S, y2: oy, class: "origin-line",
                });

                // Down diamonds
                for (let j = 0; j < nR; j++) {
                    for (let i = 0; i < nC; i++) {
                        const [cx, cy] = downPos(i, j);
                        const val = dm[j][i];
                        draw("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#e0a8a8" : "#fff",
                            stroke: "#9a4a4a",
                            "data-source": "down",
                            "data-i": i,
                            "data-j": j,
                        });
                        if (val) {
                            draw("path", {
                                d: downArrowPath(cx, cy, j === u.originRow),
                                fill: "#7a2d2d",
                                "pointer-events": "none",
                            });
                        }
                    }
                }

                // Right diamonds
                for (let i = 0; i < nC; i++) {
                    for (let j = 0; j < nR; j++) {
                        const [cx, cy] = rightPos(i, j);
                        const val = rm[i][j];
                        draw("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#bcd8e8" : "#fff",
                            stroke: "#5a8aaa",
                            "data-source": "right",
                            "data-i": i,
                            "data-j": j,
                        });
                        if (val) {
                            draw("path", {
                                d: rightArrowPath(cx, cy, i === u.originCol),
                                fill: "#3d6a8a",
                                "pointer-events": "none",
                            });
                        }
                    }
                }
            }

            render();
            attachSvgPanZoom(svg, svg.querySelector("g.viewport"));
        </script>
    </body>
</html>
