<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Coylean Universe Prototype</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #333;
                display: flex;
                height: 100vh;
            }

            .sidebar {
                width: 320px;
                min-width: 320px;
                padding: 20px;
                background: #fff;
                border-right: 1px solid #ddd;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            h1 {
                font-size: 1.2em;
                color: #222;
            }
            h2 {
                font-size: 0.85em;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .call-sig {
                font-family: monospace;
                font-size: 0.9em;
                color: #2a7a3a;
                padding: 8px 12px;
                background: #f5f5f5;
                border-radius: 6px;
                border: 1px solid #ccc;
                white-space: pre-wrap;
            }

            /* Cross formation for N/S/W/E extents */
            .extent-cross {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: auto auto auto;
                gap: 6px;
                justify-items: center;
                align-items: center;
            }
            .extent-cross .slot-n { grid-column: 2; grid-row: 1; }
            .extent-cross .slot-w { grid-column: 1; grid-row: 2; }
            .extent-cross .slot-c { grid-column: 2; grid-row: 2; }
            .extent-cross .slot-e { grid-column: 3; grid-row: 2; }
            .extent-cross .slot-s { grid-column: 2; grid-row: 3; }

            .control {
                display: flex;
                flex-direction: column;
                gap: 2px;
                align-items: center;
            }
            .control label {
                font-size: 0.72em;
                color: #666;
            }
            .control input {
                width: 64px;
                padding: 4px 8px;
                background: #f5f5f5;
                border: 1px solid #ccc;
                color: #333;
                border-radius: 4px;
                font-size: 0.9em;
                text-align: center;
            }
            .slot-c .origin-marker {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #bc8cff;
                border: 1px solid #7c5cb0;
            }

            .init-row {
                display: flex;
                gap: 10px;
                justify-content: center;
            }

            .main {
                flex: 1;
                overflow: hidden;
                padding: 0;
                background: #fff;
            }

            #diagram {
                width: 100%;
                height: 100%;
                display: block;
                touch-action: none;
                cursor: grab;
                background: #fff;
            }
            #diagram.dragging { cursor: grabbing; }
            .diamond { stroke-width: 1; }
            .coord-label {
                font-size: 11px;
                font-family: monospace;
                pointer-events: none;
                text-anchor: middle;
                fill: #888;
            }
            .origin-line {
                stroke: #bc8cff;
                stroke-width: 1;
                stroke-dasharray: 3 3;
            }
        </style>
    </head>
    <body>
        <div class="sidebar">
            <h1>Universe Prototype</h1>

            <div class="call-sig" id="call-sig"></div>

            <h2>Extents</h2>
            <div class="extent-cross">
                <div class="slot-n control">
                    <label>north</label>
                    <input type="number" id="northExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-w control">
                    <label>west</label>
                    <input type="number" id="westExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-c" title="origin">
                    <div class="origin-marker"></div>
                </div>
                <div class="slot-e control">
                    <label>east</label>
                    <input type="number" id="eastExtent" value="4" min="1" max="32" />
                </div>
                <div class="slot-s control">
                    <label>south</label>
                    <input type="number" id="southExtent" value="4" min="1" max="32" />
                </div>
            </div>

            <h2>Init</h2>
            <div class="init-row">
                <div class="control">
                    <label>hInitCol</label>
                    <input type="number" id="hInitCol" value="1" min="-20" max="20" />
                </div>
                <div class="control">
                    <label>vInitRow</label>
                    <input type="number" id="vInitRow" value="1" min="-20" max="20" />
                </div>
            </div>

            <h2>Info</h2>
            <div class="call-sig" id="info"></div>
        </div>

        <div class="main">
            <svg id="diagram"></svg>
        </div>

        <script type="module">
            import { Universe } from "./coylean-core.js";

            const S = 32;
            const D = S / 2;
            const PAD = 40;

            const svg = document.getElementById("diagram");
            const callSig = document.getElementById("call-sig");
            const info = document.getElementById("info");

            const inputs = {
                northExtent: document.getElementById("northExtent"),
                southExtent: document.getElementById("southExtent"),
                westExtent:  document.getElementById("westExtent"),
                eastExtent:  document.getElementById("eastExtent"),
                hInitCol:    document.getElementById("hInitCol"),
                vInitRow:    document.getElementById("vInitRow"),
            };

            for (const inp of Object.values(inputs)) {
                inp.addEventListener("input", render);
            }

            function svgEl(tag, attrs) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
                return el;
            }

            function diamondPts(cx, cy) {
                return `${cx},${cy - D} ${cx + D},${cy} ${cx},${cy + D} ${cx - D},${cy}`;
            }

            function downPos(i, j) { return [PAD + (i + 0.5) * S, PAD + j * S]; }
            function rightPos(i, j) { return [PAD + i * S, PAD + (j + 0.5) * S]; }

            const ARR_MARGIN = 1.5;
            const ARR_SW = 1.25;
            const ARR_HL = 6;
            const ARR_HW = 3;
            const ARR_ND = 2;

            function downArrowPath(cx, cy, doubleHeaded) {
                const t = cy - D + ARR_MARGIN;
                const b = cy + D - ARR_MARGIN;
                if (doubleHeaded) {
                    return `M${cx},${t} L${cx + ARR_HW},${t + ARR_HL} ${cx + ARR_SW},${t + ARR_HL - ARR_ND} ${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND} ${cx - ARR_SW},${t + ARR_HL - ARR_ND} ${cx - ARR_HW},${t + ARR_HL}Z`;
                }
                return `M${cx - ARR_SW},${t} A${ARR_SW},${ARR_SW} 0 0 1 ${cx + ARR_SW},${t} L${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND}Z`;
            }

            function rightArrowPath(cx, cy, doubleHeaded) {
                const l = cx - D + ARR_MARGIN;
                const r = cx + D - ARR_MARGIN;
                if (doubleHeaded) {
                    return `M${l},${cy} L${l + ARR_HL},${cy - ARR_HW} ${l + ARR_HL - ARR_ND},${cy - ARR_SW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW} ${r - ARR_HL},${cy - ARR_HW} ${r},${cy} ${r - ARR_HL},${cy + ARR_HW} ${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${l + ARR_HL - ARR_ND},${cy + ARR_SW} ${l + ARR_HL},${cy + ARR_HW}Z`;
                }
                return `M${l},${cy - ARR_SW} A${ARR_SW},${ARR_SW} 0 0 0 ${l},${cy + ARR_SW} L${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${r - ARR_HL},${cy + ARR_HW} ${r},${cy} ${r - ARR_HL},${cy - ARR_HW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW}Z`;
            }

            // ── Viewport state ──
            // offsetX/offsetY: translation applied to the <g> viewport (svg user units).
            // scale: zoom factor. Identity = { offsetX: 0, offsetY: 0, scale: 1 }.
            const viewport = { offsetX: 0, offsetY: 0, scale: 1 };
            let viewportGroup = null;

            function applyTransform() {
                if (!viewportGroup) return;
                viewportGroup.setAttribute(
                    "transform",
                    `translate(${viewport.offsetX} ${viewport.offsetY}) scale(${viewport.scale})`,
                );
            }

            // Convert a client (mouse/touch) point to svg user coordinates.
            function clientToSvg(clientX, clientY) {
                const pt = svg.createSVGPoint();
                pt.x = clientX;
                pt.y = clientY;
                const ctm = svg.getScreenCTM();
                if (!ctm) return { x: clientX, y: clientY };
                const p = pt.matrixTransform(ctm.inverse());
                return { x: p.x, y: p.y };
            }

            // Zoom centered on an svg-coord point: keeps that world point under the cursor.
            function zoomAt(svgX, svgY, factor) {
                const newScale = Math.max(0.05, Math.min(40, viewport.scale * factor));
                const worldX = (svgX - viewport.offsetX) / viewport.scale;
                const worldY = (svgY - viewport.offsetY) / viewport.scale;
                viewport.scale = newScale;
                viewport.offsetX = svgX - worldX * newScale;
                viewport.offsetY = svgY - worldY * newScale;
                applyTransform();
            }

            // ── Mouse handlers ──
            let mousePan = null; // { lastX, lastY } in svg coords

            svg.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                const p = clientToSvg(e.clientX, e.clientY);
                mousePan = { lastX: p.x, lastY: p.y };
                svg.classList.add("dragging");
                e.preventDefault();
            });
            window.addEventListener("mousemove", (e) => {
                if (!mousePan) return;
                const p = clientToSvg(e.clientX, e.clientY);
                viewport.offsetX += p.x - mousePan.lastX;
                viewport.offsetY += p.y - mousePan.lastY;
                mousePan.lastX = p.x;
                mousePan.lastY = p.y;
                applyTransform();
            });
            window.addEventListener("mouseup", () => {
                mousePan = null;
                svg.classList.remove("dragging");
            });

            svg.addEventListener(
                "wheel",
                (e) => {
                    e.preventDefault();
                    const p = clientToSvg(e.clientX, e.clientY);
                    const factor = Math.exp(-e.deltaY * 0.0015);
                    zoomAt(p.x, p.y, factor);
                },
                { passive: false },
            );

            // ── Touch handlers ──
            // One finger: pan. Two fingers: pinch zoom around midpoint.
            let touchState = null;

            function touchMidDist(touches) {
                const a = clientToSvg(touches[0].clientX, touches[0].clientY);
                const b = clientToSvg(touches[1].clientX, touches[1].clientY);
                const midX = (a.x + b.x) / 2;
                const midY = (a.y + b.y) / 2;
                const dist = Math.hypot(b.x - a.x, b.y - a.y);
                return { midX, midY, dist };
            }

            svg.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1) {
                        const p = clientToSvg(
                            e.touches[0].clientX,
                            e.touches[0].clientY,
                        );
                        touchState = { mode: "pan", lastX: p.x, lastY: p.y };
                    } else if (e.touches.length === 2) {
                        const m = touchMidDist(e.touches);
                        touchState = {
                            mode: "pinch",
                            startDist: m.dist,
                            startMidX: m.midX,
                            startMidY: m.midY,
                            startOffsetX: viewport.offsetX,
                            startOffsetY: viewport.offsetY,
                            startScale: viewport.scale,
                        };
                    }
                },
                { passive: false },
            );

            svg.addEventListener(
                "touchmove",
                (e) => {
                    e.preventDefault();
                    if (!touchState) return;
                    if (touchState.mode === "pan" && e.touches.length === 1) {
                        const p = clientToSvg(
                            e.touches[0].clientX,
                            e.touches[0].clientY,
                        );
                        viewport.offsetX += p.x - touchState.lastX;
                        viewport.offsetY += p.y - touchState.lastY;
                        touchState.lastX = p.x;
                        touchState.lastY = p.y;
                        applyTransform();
                    } else if (
                        touchState.mode === "pinch" &&
                        e.touches.length === 2
                    ) {
                        const m = touchMidDist(e.touches);
                        const factor = m.dist / touchState.startDist;
                        const newScale = Math.max(
                            0.05,
                            Math.min(40, touchState.startScale * factor),
                        );
                        // Zoom anchored on the initial midpoint, then translate by midpoint drift.
                        const worldMidX =
                            (touchState.startMidX - touchState.startOffsetX) /
                            touchState.startScale;
                        const worldMidY =
                            (touchState.startMidY - touchState.startOffsetY) /
                            touchState.startScale;
                        viewport.scale = newScale;
                        viewport.offsetX =
                            touchState.startMidX -
                            worldMidX * newScale +
                            (m.midX - touchState.startMidX);
                        viewport.offsetY =
                            touchState.startMidY -
                            worldMidY * newScale +
                            (m.midY - touchState.startMidY);
                        applyTransform();
                    }
                },
                { passive: false },
            );

            svg.addEventListener("touchend", (e) => {
                if (e.touches.length === 0) {
                    touchState = null;
                } else if (e.touches.length === 1) {
                    const p = clientToSvg(
                        e.touches[0].clientX,
                        e.touches[0].clientY,
                    );
                    touchState = { mode: "pan", lastX: p.x, lastY: p.y };
                }
            });

            function render() {
                const northExtent = +inputs.northExtent.value;
                const southExtent = +inputs.southExtent.value;
                const westExtent  = +inputs.westExtent.value;
                const eastExtent  = +inputs.eastExtent.value;
                const hInitCol    = +inputs.hInitCol.value;
                const vInitRow    = +inputs.vInitRow.value;

                callSig.textContent =
                    `Universe.create({\n` +
                    `  northExtent: ${northExtent},\n` +
                    `  southExtent: ${southExtent},\n` +
                    `  westExtent:  ${westExtent},\n` +
                    `  eastExtent:  ${eastExtent},\n` +
                    `  hInitCol:    ${hInitCol},\n` +
                    `  vInitRow:    ${vInitRow},\n` +
                    `})`;

                const u = Universe.create({
                    northExtent, southExtent, westExtent, eastExtent,
                    hInitCol, vInitRow,
                });

                const nR = northExtent + southExtent - 1;
                const nC = westExtent + eastExtent - 1;

                info.textContent =
                    `rows: ${nR}  cols: ${nC}\n` +
                    `origin: r${u.originRow} c${u.originCol}`;

                const w = 2 * PAD + nC * S;
                const h = 2 * PAD + nR * S;
                svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
                svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
                svg.innerHTML = "";

                // All drawn content lives inside a transform group controlled by viewport.
                viewportGroup = svgEl("g", { id: "viewport" });
                svg.appendChild(viewportGroup);
                applyTransform();
                const draw = (tag, attrs) => {
                    const el = svgEl(tag, attrs);
                    viewportGroup.appendChild(el);
                    return el;
                };

                const dm = u.downMatrix;
                const rm = u.rightMatrix;

                // Origin crosshair
                const [ox] = [PAD + u.originCol * S + S / 2];
                const [oy] = [PAD + u.originRow * S + S / 2];
                draw("line", {
                    x1: ox, y1: PAD, x2: ox, y2: PAD + nR * S, class: "origin-line",
                });
                draw("line", {
                    x1: PAD, y1: oy, x2: PAD + nC * S, y2: oy, class: "origin-line",
                });

                // Down diamonds
                for (let j = 0; j < nR; j++) {
                    for (let i = 0; i < nC; i++) {
                        const [cx, cy] = downPos(i, j);
                        const val = dm[j][i];
                        draw("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#e0a8a8" : "#fff",
                            stroke: "#9a4a4a",
                        });
                        if (val) {
                            draw("path", {
                                d: downArrowPath(cx, cy, j === u.originRow),
                                fill: "#7a2d2d",
                            });
                        }
                    }
                }

                // Right diamonds
                for (let i = 0; i < nC; i++) {
                    for (let j = 0; j < nR; j++) {
                        const [cx, cy] = rightPos(i, j);
                        const val = rm[i][j];
                        draw("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#bcd8e8" : "#fff",
                            stroke: "#5a8aaa",
                        });
                        if (val) {
                            draw("path", {
                                d: rightArrowPath(cx, cy, i === u.originCol),
                                fill: "#3d6a8a",
                            });
                        }
                    }
                }
            }

            render();
        </script>
    </body>
</html>
