<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Coylean Exploration Prototype</title>
        <link rel="stylesheet" href="prototype.css" />
        <style>
            /* Page-specific: details-panel content styling + SVG rendering. */
            .info-panel .title {
                font-weight: 600;
                margin-bottom: 6px;
                color: #2e7d32;
            }
            .info-panel .row {
                font-family: monospace;
                margin: 3px 0;
                color: #333;
            }
            .info-panel .dim {
                color: #888;
            }
            .info-panel .val-true {
                color: #16a34a;
            }
            .info-panel .val-false {
                color: #dc2626;
            }

            #diagram {
                width: 100%;
                height: 100%;
                display: block;
                cursor: grab;
                touch-action: none;
                background: #fff;
            }
            #diagram.dragging { cursor: grabbing; }

            .diamond {
                cursor: pointer;
                transition: filter 0.1s;
            }
            .diamond:hover {
                filter: brightness(1.4);
            }

            .quadrant-bg {
                fill: #fafafa;
                stroke: #ddd;
                stroke-width: 1;
            }
            .quadrant-label {
                font-family: system-ui, sans-serif;
                font-size: 13px;
                font-weight: 700;
                fill: #888;
                letter-spacing: 0.12em;
            }

            .coord-label {
                font-size: 14px;
                font-family: monospace;
                pointer-events: none;
                text-anchor: middle;
            }
        </style>
    </head>
    <body class="layout-sidebar">
        <nav class="breadcrumb">
            <a href="index.html">Index</a>
            <span class="sep">›</span>
            <a href="basic-propagation-prototype.html">Basic Propagation</a>
            <span class="sep">›</span>
            <a href="exploration-prototype.html" class="current">Exploration Prototype</a>
            <span class="sep">›</span>
            <a href="universe-quadrants-prototype.html">Universe-Quadrants</a>
            <span class="sep">›</span>
            <a href="universal-propagate-prototype.html">Universal Propagate Prototype</a>
            <span class="sep">›</span>
            <a href="universe-prototype.html">Universe Prototype</a>
        </nav>
        <div class="layout-body">
            <div class="sidebar">
                <h1>Exploration Prototype</h1>

                <div class="call-sig" id="call-sig"></div>

                <div class="controls">
                    <div class="control-row">
                        <div class="control">
                            <label>numRows</label>
                            <input type="number" id="numRows" value="8" min="1" max="64" />
                        </div>
                        <div class="control">
                            <label>numCols</label>
                            <input type="number" id="numCols" value="8" min="1" max="64" />
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control">
                            <label>hInitCol</label>
                            <input type="number" id="hInitCol" value="1" min="-20" max="20" />
                        </div>
                        <div class="control">
                            <label>vInitRow</label>
                            <input type="number" id="vInitRow" value="1" min="-20" max="20" />
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control">
                            <label>Seniority</label>
                            <button id="seniority" class="btn">Vertical</button>
                        </div>
                    </div>
                </div>

                <h2>Display</h2>
                <div class="toggle-row">
                    <button id="tog-labels">Labels</button>
                    <button id="tog-pri">Priority</button>
                    <button id="tog-minimize">Minimize</button>
                    <button id="tog-encroach">Encroach</button>
                </div>

                <h2>Legend</h2>
                <div class="legend">
                    <div class="legend-item">
                        <svg class="legend-swatch" viewBox="-12 -12 24 24">
                            <polygon
                                points="0,-10 10,0 0,10 -10,0"
                                fill="#e0a8a8"
                                stroke="#9a4a4a"
                                stroke-width="1.5"
                            />
                            <path
                                d="M-0.5,-9.5 A0.5,0.5 0 0 1 0.5,-9.5 L0.5,7.7 1.8,6.5 0,9.5 -1.8,6.5 -0.5,7.7Z"
                                fill="#7a2d2d"
                            />
                        </svg>
                        <span>downMatrix[j][i] = true</span>
                    </div>
                    <div class="legend-item">
                        <svg class="legend-swatch" viewBox="-12 -12 24 24">
                            <polygon
                                points="0,-10 10,0 0,10 -10,0"
                                fill="#fff"
                                stroke="#9a4a4a"
                                stroke-width="1.5"
                            />
                        </svg>
                        <span>downMatrix[j][i] = false</span>
                    </div>
                    <div class="legend-item">
                        <svg class="legend-swatch" viewBox="-12 -12 24 24">
                            <polygon
                                points="0,-10 10,0 0,10 -10,0"
                                fill="#bcd8e8"
                                stroke="#5a8aaa"
                                stroke-width="1.5"
                            />
                            <path
                                d="M-9.5,-0.5 A0.5,0.5 0 0 0 -9.5,0.5 L7.7,0.5 6.5,1.8 9.5,0 6.5,-1.8 7.7,-0.5Z"
                                fill="#3d6a8a"
                            />
                        </svg>
                        <span>rightMatrix[i][j] = true</span>
                    </div>
                    <div class="legend-item">
                        <svg class="legend-swatch" viewBox="-12 -12 24 24">
                            <polygon
                                points="0,-10 10,0 0,10 -10,0"
                                fill="#fff"
                                stroke="#5a8aaa"
                                stroke-width="1.5"
                            />
                        </svg>
                        <span>rightMatrix[i][j] = false</span>
                    </div>
                </div>

                <h2>Details</h2>
                <div class="info-panel" id="info"></div>
            </div>

            <div class="main">
                <svg id="diagram"></svg>
            </div>
        </div>

        <script type="module">
            import { init } from "./src/app/exploration-prototype-page.js";
            init();
        </script>
    </body>
</html>
