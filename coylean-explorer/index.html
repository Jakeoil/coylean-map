<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="shortcut icon" href="map-icon.png" />
        <title>Coylean Map Exploration</title>
        <link rel="stylesheet" href="math.css" />
    </head>

    <body>
        <header>
            <h1>Coylean Map exploration</h1>
            <h2>Move the true downs and rights back and forth</h2>
            <a href="diagram.html" style="display:inline-block;margin-left:24px;padding:6px 18px;background:#1f6feb;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Propagation Diagram</a>
            <a href="diagram2.html" style="display:inline-block;margin-left:8px;padding:6px 18px;background:#5a9a4a;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Propagation Diagram 2</a>
            <a href="universe-prototype.html" style="display:inline-block;margin-left:8px;padding:6px 18px;background:#7c5cb0;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Universe Prototype</a>
            <a href="universal-propagate-prototype.html" style="display:inline-block;margin-left:8px;padding:6px 18px;background:#b07c5c;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Universal Propagate Prototype</a>
            <a href="init-col-problem.html" style="display:inline-block;margin-left:8px;padding:6px 18px;background:#b05c5c;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Init-Col Problem</a>
        </header>
        <div id="meat">
            <div id="controls">
                <h3>Controls</h3>
                <div class="control-group" id="feature">
                    <h4>Map Type</h4>
                    <button id="feature-active"></button>
                    <br />
                    <input type="radio" name="feature" id="legacy" />
                    <label for="legacy">Legacy</label>
                    <input type="radio" name="feature" id="explore" />
                    <label for="explore">Explore</label>
                    <input type="radio" name="feature" id="universe" />
                    <label for="universe">Universe</label>
                </div>
                <div class="control-group">
                    <h4>Size</h4>
                    <div class="control-row">
                        <div class="control">
                            <label>numRows</label>
                            <input type="number" id="numRows" value="65" min="1" max="500">
                        </div>
                        <div class="control">
                            <label>numCols</label>
                            <input type="number" id="numCols" value="65" min="1" max="500">
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control">
                            <label>Seniority</label>
                            <button id="seniority">Vertical</button>
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control">
                            <label>Scale</label>
                            <input type="number" id="scale" value="8" min="1" max="50">
                        </div>
                    </div>
                </div>
                <div class="control-group can-explore">
                    <h4>Position</h4>
                    <div class="control-row">
                        <div class="control">
                            <label>hInitCol</label>
                            <input type="number" id="hInitCol" value="1" min="-500" max="500">
                        </div>
                        <div class="control">
                            <label>vInitRow</label>
                            <input type="number" id="vInitRow" value="1" min="-500" max="500">
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control">
                            <label>Init segments</label>
                            <button id="showInit">Off</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="content">
                <div id="explore-map">
                    <h2>Explore the map</h2>
                    <canvas></canvas>
                </div>
            </div>
        </div>
        <script type="module" src="coylean-app.js"></script>
    </body>
</html>
