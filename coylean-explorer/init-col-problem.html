<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Init-Col Problem</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f5;
                color: #333;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            header {
                background: #fff;
                border-bottom: 1px solid #ddd;
                padding: 14px 20px;
                display: flex;
                flex-wrap: wrap;
                gap: 16px;
                align-items: center;
            }
            header h1 {
                font-size: 1.1em;
                color: #222;
            }
            header a {
                padding: 4px 12px;
                background: #1f6feb;
                color: #fff;
                border-radius: 6px;
                text-decoration: none;
                font-size: 0.85em;
                font-weight: 600;
            }

            .controls {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }
            .control {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .control label {
                font-size: 0.72em;
                color: #666;
            }
            .control input {
                width: 64px;
                padding: 4px 8px;
                background: #f5f5f5;
                border: 1px solid #ccc;
                color: #333;
                border-radius: 4px;
                font-size: 0.9em;
                text-align: center;
            }

            /* ── Diagrams: side-by-side by default, stack on narrow viewports ── */
            .diagrams {
                flex: 1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1px;
                background: #ddd;
            }
            @media (max-width: 900px) {
                .diagrams {
                    grid-template-columns: 1fr;
                }
            }
            .diagram-wrap {
                background: #fff;
                padding: 16px;
                overflow: auto;
            }
            .diagram-wrap h2 {
                font-size: 0.95em;
                color: #444;
                margin-bottom: 8px;
            }
            .diagram-wrap .sub {
                font-family: monospace;
                font-size: 0.8em;
                color: #2a7a3a;
                margin-bottom: 12px;
            }

            svg {
                display: block;
            }
            .diamond {
                stroke-width: 1.2;
            }
            .arrow-path {
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Init-Col Problem</h1>
            <a href="index.html">Index</a>
            <div class="controls">
                <div class="control">
                    <label>numRows</label>
                    <input type="number" id="numRows" value="4" min="1" max="16" />
                </div>
                <div class="control">
                    <label>numCols</label>
                    <input type="number" id="numCols" value="4" min="1" max="16" />
                </div>
                <div class="control">
                    <label>hInitCol</label>
                    <input type="number" id="hInitCol" value="1" min="-20" max="20" />
                </div>
                <div class="control">
                    <label>vInitRow</label>
                    <input type="number" id="vInitRow" value="1" min="-20" max="20" />
                </div>
            </div>
        </header>

        <div class="diagrams">
            <div class="diagram-wrap">
                <h2>Legacy</h2>
                <div class="sub" id="sub-legacy"></div>
                <svg id="svg-legacy"></svg>
            </div>
            <div class="diagram-wrap">
                <h2>Propagation (Universe class)</h2>
                <div class="sub" id="sub-new"></div>
                <svg id="svg-new"></svg>
            </div>
        </div>

        <script type="module">
            import {
                pri,
                propagate,
                Propagation,
                Seniority,
            } from "./coylean-core.js";

            const S = 72;
            const D = S / 2;
            const PAD = 40;

            const inputs = {
                numRows: document.getElementById("numRows"),
                numCols: document.getElementById("numCols"),
                hInitCol: document.getElementById("hInitCol"),
                vInitRow: document.getElementById("vInitRow"),
            };
            for (const inp of Object.values(inputs)) {
                inp.addEventListener("input", render);
            }

            // ── SVG helpers ──
            function svgEl(tag, attrs) {
                const el = document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    tag,
                );
                for (const [k, v] of Object.entries(attrs))
                    el.setAttribute(k, v);
                return el;
            }
            function diamondPts(cx, cy) {
                return `${cx},${cy - D} ${cx + D},${cy} ${cx},${cy + D} ${cx - D},${cy}`;
            }
            function downPos(i, j) { return [PAD + (i + 0.5) * S, PAD + j * S]; }
            function rightPos(i, j) { return [PAD + i * S, PAD + (j + 0.5) * S]; }

            // ── Arrow paths (same style as diagram2) ──
            const ARR_MARGIN = 1.5, ARR_SW = 1.25, ARR_HL = 8, ARR_HW = 3.5, ARR_ND = 2.5;

            function downArrowPath(cx, cy, dbl) {
                const t = cy - D + ARR_MARGIN, b = cy + D - ARR_MARGIN;
                if (dbl) {
                    return `M${cx},${t} L${cx + ARR_HW},${t + ARR_HL} ${cx + ARR_SW},${t + ARR_HL - ARR_ND} ${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND} ${cx - ARR_SW},${t + ARR_HL - ARR_ND} ${cx - ARR_HW},${t + ARR_HL}Z`;
                }
                return `M${cx - ARR_SW},${t} A${ARR_SW},${ARR_SW} 0 0 1 ${cx + ARR_SW},${t} L${cx + ARR_SW},${b - ARR_HL + ARR_ND} ${cx + ARR_HW},${b - ARR_HL} ${cx},${b} ${cx - ARR_HW},${b - ARR_HL} ${cx - ARR_SW},${b - ARR_HL + ARR_ND}Z`;
            }
            function rightArrowPath(cx, cy, dbl) {
                const l = cx - D + ARR_MARGIN, r = cx + D - ARR_MARGIN;
                if (dbl) {
                    return `M${l},${cy} L${l + ARR_HL},${cy - ARR_HW} ${l + ARR_HL - ARR_ND},${cy - ARR_SW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW} ${r - ARR_HL},${cy - ARR_HW} ${r},${cy} ${r - ARR_HL},${cy + ARR_HW} ${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${l + ARR_HL - ARR_ND},${cy + ARR_SW} ${l + ARR_HL},${cy + ARR_HW}Z`;
                }
                return `M${l},${cy - ARR_SW} A${ARR_SW},${ARR_SW} 0 0 0 ${l},${cy + ARR_SW} L${r - ARR_HL + ARR_ND},${cy + ARR_SW} ${r - ARR_HL},${cy + ARR_HW} ${r},${cy} ${r - ARR_HL},${cy - ARR_HW} ${r - ARR_HL + ARR_ND},${cy - ARR_SW}Z`;
            }

            // ── Draw a single diagram from matrices ──
            function drawDiagram(svg, downMatrix, rightMatrix, numRows, numCols) {
                const w = 2 * PAD + numCols * S;
                const h = 2 * PAD + numRows * S;
                svg.setAttribute("width", w);
                svg.setAttribute("height", h);
                svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
                svg.innerHTML = "";

                // Down diamonds: (numRows+1) × numCols
                for (let j = 0; j <= numRows; j++) {
                    for (let i = 0; i < numCols; i++) {
                        const [cx, cy] = downPos(i, j);
                        const val = downMatrix[j][i];
                        svg.appendChild(svgEl("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#e0a8a8" : "#fff",
                            stroke: "#9a4a4a",
                        }));
                        if (val) {
                            svg.appendChild(svgEl("path", {
                                d: downArrowPath(cx, cy, j === 0),
                                class: "arrow-path",
                                fill: "#7a2d2d",
                            }));
                        }
                    }
                }
                // Right diamonds: (numCols+1) × numRows
                for (let i = 0; i <= numCols; i++) {
                    for (let j = 0; j < numRows; j++) {
                        const [cx, cy] = rightPos(i, j);
                        const val = rightMatrix[i][j];
                        svg.appendChild(svgEl("polygon", {
                            points: diamondPts(cx, cy),
                            class: "diamond",
                            fill: val ? "#bcd8e8" : "#fff",
                            stroke: "#5a8aaa",
                        }));
                        if (val) {
                            svg.appendChild(svgEl("path", {
                                d: rightArrowPath(cx, cy, i === 0),
                                class: "arrow-path",
                                fill: "#3d6a8a",
                            }));
                        }
                    }
                }
            }

            // ── Render both diagrams ──
            function render() {
                const nR = +inputs.numRows.value;
                const nC = +inputs.numCols.value;
                const hInitCol = +inputs.hInitCol.value;
                const vInitRow = +inputs.vInitRow.value;

                document.getElementById("sub-legacy").textContent =
                    `propagate(${nR}, ${nC}, ${hInitCol}, ${vInitRow})  // diagram2 path`;
                document.getElementById("sub-new").textContent =
                    `Propagation.create({ ${nR}, ${nC}, hInitCol=${hInitCol}, vInitRow=${vInitRow} })  // Universe path`;

                // Left panel — the working path used by diagram2.
                const leg = propagate(
                    nR, nC, hInitCol, vInitRow, Seniority.vertical(),
                );
                drawDiagram(
                    document.getElementById("svg-legacy"),
                    leg.downMatrix, leg.rightMatrix, nR, nC,
                );

                // Right panel — the path the Universe class drives a quadrant through.
                const p = Propagation.create({
                    direction: "se",
                    numRows: nR,
                    numColumns: nC,
                    hInitCol,
                    vInitRow,
                    seniority: Seniority.vertical(),
                });
                drawDiagram(
                    document.getElementById("svg-new"),
                    p.downMatrix, p.rightMatrix, nR, nC,
                );
            }

            render();
        </script>
    </body>
</html>
