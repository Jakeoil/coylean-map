<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Curve Intersection Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; color: #222; font-family: monospace; display: flex; height: 100vh; }
  #sidebar {
    width: 260px; min-width: 260px; padding: 14px; background: #f5f5f5;
    border-right: 1px solid #ccc; display: flex;
    flex-direction: column; gap: 8px; max-height: 100vh;
  }
  #sidebar h2 { font-size: 15px; color: #333; }
  .btn-row { display: flex; gap: 6px; }
  button {
    padding: 6px 10px; background: #e8e8e8; color: #222; border: 1px solid #aaa;
    border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px;
  }
  button:hover { background: #ddd; }
  button.active { background: #d04050; color: #fff; border-color: #b0303e; }
  button.active:hover { background: #c03848; }
  #modeLabel { font-size: 11px; color: #666; }
  .panel-label { font-size: 12px; color: #555; font-weight: bold; margin-top: 4px; }
  #ixList { font-size: 11px; line-height: 1.4; overflow-y: auto; max-height: 12vh; }
  #ixList .ix-entry {
    padding: 4px 6px; margin-bottom: 3px; background: #fff; border: 1px solid #ddd;
    border-left: 3px solid #d04050; border-radius: 3px;
  }
  #ixList .ix-entry.hovered { border-left-color: #e8a000; background: #fffbe6; }
  #regionList { font-size: 11px; line-height: 1.4; overflow-y: auto; max-height: 12vh; }
  #regionList .rg-entry {
    padding: 4px 6px; margin-bottom: 3px; background: #fff; border: 1px solid #ddd;
    border-radius: 3px; display: flex; align-items: center; gap: 6px;
  }
  #regionList .rg-entry.hovered { background: #e8f4ff; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; border: 1px solid #ccc; }
  #configPanel { font-size: 11px; display: flex; flex-wrap: wrap; gap: 2px 10px; }
  #configPanel label { cursor: pointer; user-select: none; }
  #lineList { font-size: 11px; line-height: 1.4; overflow-y: auto; max-height: 12vh; }
  #lineList .ln-entry {
    padding: 4px 6px; margin-bottom: 3px; background: #fff; border: 1px solid #ddd;
    border-left: 3px solid #555; border-radius: 3px;
  }
  canvas { flex: 1; display: block; cursor: crosshair; background: #a8cce0; }
  #tooltip {
    position: fixed; pointer-events: none; background: rgba(255,255,255,0.96);
    border: 1px solid #d04050; padding: 8px 12px; font-size: 12px;
    font-family: monospace; color: #222; display: none; z-index: 10;
    white-space: pre-line; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Curve Intersections</h2>
  <div class="btn-row">
    <button id="clearBtn">Clear</button>
    <button id="altBtn">Alternating</button>
  </div>
  <div id="modeLabel">alternating: off</div>
  <div class="panel-label">Display</div>
  <div id="configPanel">
    <label><input type="checkbox" id="showRegions" checked> Regions</label>
    <label><input type="checkbox" id="showRegionLabels" checked> Region labels</label>
    <label><input type="checkbox" id="showCrossings" checked> Crossings</label>
    <label><input type="checkbox" id="showPaths" checked> Paths</label>
  </div>
  <div class="panel-label">Crossings</div>
  <div id="ixList"></div>
  <div class="panel-label">Lines</div>
  <div id="lineList"></div>
  <div class="panel-label">Regions</div>
  <div id="regionList"></div>
</div>
<canvas id="canvas"></canvas>
<div id="tooltip"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ixListEl = document.getElementById('ixList');
const lineListEl = document.getElementById('lineList');
const regionListEl = document.getElementById('regionList');
const tooltip = document.getElementById('tooltip');
const clearBtn = document.getElementById('clearBtn');
const altBtn = document.getElementById('altBtn');
const modeLabel = document.getElementById('modeLabel');
const showRegionsCb = document.getElementById('showRegions');
const showRegionLabelsCb = document.getElementById('showRegionLabels');
const showCrossingsCb = document.getElementById('showCrossings');
const showPathsCb = document.getElementById('showPaths');

// === State ===

let alternating = false;
let strokes = [];
let currentStroke = null;
let allSegments = [];    // {x1,y1,x2,y2, strokeIdx, seqIdx}
let drawing = false;
let intersections = [];  // {x, y, a1, a2, id, cuts: [{strokeIdx, pos}]}
let regions = [];        // {id, polygon, color, area}
let nextIxId = 1;
let nextRegionId = 1;
let hoveredIx = null;
let hoveredEdge = null;   // {points, id, twinId, originNode, destNode, leftFace, rightFace}
let hoveredRegion = null; // region id

// Persistent DCEL data from last rebuildRegions (for hover queries)
let dcelEdges = [];   // [{id, twinId, points, originNode, destNode, face, twinFace}]
let dcelFaces = [];   // [{id, polygon, area, isOuter, regionId, edgeCount, adjFaces}]
let inputBuffer = [];
let pointerDown = false;
let lastPointerPos = null;
let altPrevPos = null;     // previous mouse position for alternating crossing detection
let altDrawing = false;    // currently drawing in alternating mode

// View transform (pan/zoom)
let viewX = 0, viewY = 0, viewScale = 1;
let panning = false, panStartX = 0, panStartY = 0, panViewX0 = 0, panViewY0 = 0;

function screenToWorld(sx, sy) {
  return { x: (sx - viewX) / viewScale, y: (sy - viewY) / viewScale };
}
function worldToScreen(wx, wy) {
  return { x: wx * viewScale + viewX, y: wy * viewScale + viewY };
}

const REGION_PALETTE = [
  null,                       // 0 = background (ocean, unfilled)
  'rgba(245,235,210,0.92)',   // 1 = sand/land
  'rgba(200,220,180,0.92)',   // 2 = green land
  'rgba(230,210,185,0.92)',   // 3 = tan
  'rgba(215,230,195,0.92)',   // 4 = light green
];

// === Resize ===

function resize() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  render();
}
window.addEventListener('resize', resize);

// === Geometry ===

function segIntersect(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2) {
  const dx1 = ax2 - ax1, dy1 = ay2 - ay1;
  const dx2 = bx2 - bx1, dy2 = by2 - by1;
  const denom = dx1 * dy2 - dy1 * dx2;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((bx1 - ax1) * dy2 - (by1 - ay1) * dx2) / denom;
  const u = ((bx1 - ax1) * dy1 - (by1 - ay1) * dx1) / denom;
  if (t > 0.005 && t < 0.995 && u > 0.005 && u < 0.995) {
    return { x: ax1 + t * dx1, y: ay1 + t * dy1, t, u };
  }
  return null;
}



function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

// Distance from point (px,py) to polyline (array of {x,y})
function distToPolyline(px, py, pts) {
  let best = Infinity;
  for (let i = 0; i < pts.length - 1; i++) {
    const ax = pts[i].x, ay = pts[i].y, bx = pts[i+1].x, by = pts[i+1].y;
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    let t = len2 < 0.001 ? 0 : Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / len2));
    const d = dist(px, py, ax + t*dx, ay + t*dy);
    if (d < best) best = d;
  }
  return best;
}

// Point-in-polygon (ray casting)
function pointInPolygon(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi)
      inside = !inside;
  }
  return inside;
}

// === Catmull-Rom spline ===

function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

function subdivideSpan(p0, p1, p2, p3) {
  const len = dist(p1.x, p1.y, p2.x, p2.y);
  const steps = Math.max(2, Math.ceil(len / 2.5));
  const pts = [];
  for (let i = 0; i <= steps; i++) pts.push(catmullRom(p0, p1, p2, p3, i / steps));
  return pts;
}

// === Segment building ===

function rebuildStrokeSegments(strokeIdx) {
  allSegments = allSegments.filter(s => s.strokeIdx !== strokeIdx);
  const cp = strokes[strokeIdx];
  if (cp.length < 2) return;
  let seqIdx = 0;
  for (let i = 0; i < cp.length - 1; i++) {
    const p0 = cp[Math.max(0, i - 1)], p1 = cp[i];
    const p2 = cp[i + 1], p3 = cp[Math.min(cp.length - 1, i + 2)];
    const pts = subdivideSpan(p0, p1, p2, p3);
    for (let j = 0; j < pts.length - 1; j++) {
      allSegments.push({ x1: pts[j].x, y1: pts[j].y, x2: pts[j+1].x, y2: pts[j+1].y, strokeIdx, seqIdx: seqIdx++ });
    }
  }
}

function getStrokeSegs(si) {
  return allSegments.filter(s => s.strokeIdx === si).sort((a, b) => a.seqIdx - b.seqIdx);
}

function getStrokePoints(si) {
  const segs = getStrokeSegs(si);
  if (!segs.length) return [];
  const pts = [{ x: segs[0].x1, y: segs[0].y1 }];
  for (const s of segs) pts.push({ x: s.x2, y: s.y2 });
  return pts;
}

// === Intersection detection ===

const MIN_SEQ_GAP = 8;

function checkForIntersections(strokeIdx, prevSegCount) {
  const segs = getStrokeSegs(strokeIdx);
  const checkFrom = Math.max(0, prevSegCount - 12);
  const newSegs = segs.filter(s => s.seqIdx >= checkFrom);
  const otherSegs = allSegments.filter(s => s.strokeIdx !== strokeIdx);

  for (const nseg of newSegs) {
    // Cross-stroke
    for (const seg of otherSegs) {
      const hit = segIntersect(seg.x1, seg.y1, seg.x2, seg.y2, nseg.x1, nseg.y1, nseg.x2, nseg.y2);
      if (!hit) continue;
      if (intersections.some(ix => dist(ix.x, ix.y, hit.x, hit.y) < 5)) continue;
      intersections.push({
        x: hit.x, y: hit.y, id: nextIxId++,
        cuts: [
          { strokeIdx: seg.strokeIdx, pos: seg.seqIdx + hit.t },
          { strokeIdx: nseg.strokeIdx, pos: nseg.seqIdx + hit.u }
        ]
      });
    }
    // Self-intersection
    for (const seg of segs) {
      if (Math.abs(seg.seqIdx - nseg.seqIdx) < MIN_SEQ_GAP) continue;
      if (seg.seqIdx >= nseg.seqIdx) continue;
      const hit = segIntersect(seg.x1, seg.y1, seg.x2, seg.y2, nseg.x1, nseg.y1, nseg.x2, nseg.y2);
      if (!hit) continue;
      if (intersections.some(ix => dist(ix.x, ix.y, hit.x, hit.y) < 5)) continue;
      intersections.push({
        x: hit.x, y: hit.y, id: nextIxId++,
        cuts: [
          { strokeIdx, pos: seg.seqIdx + hit.t },
          { strokeIdx, pos: nseg.seqIdx + hit.u }
        ]
      });
    }
  }
}

// === Planar graph face finding ===

function rebuildRegions() {
  regions = [];
  nextRegionId = 1;
  if (!intersections.length) { dcelEdges = []; dcelFaces = []; updateSidebar(); return; }

  // Nodes: one per intersection
  const nodes = [];
  for (const ix of intersections) {
    nodes.push({ x: ix.x, y: ix.y });
  }

  // Which strokes are involved
  const involvedStrokes = new Set();
  for (const ix of intersections) {
    for (const c of ix.cuts) involvedStrokes.add(c.strokeIdx);
  }

  // Per-stroke: collect splits, build arcs
  const halfEdges = [];

  for (const si of involvedStrokes) {
    const pts = getStrokePoints(si);
    if (pts.length < 2) continue;
    const numSegs = pts.length - 1;

    // Gather intersection splits on this stroke
    const splits = [];
    for (let i = 0; i < intersections.length; i++) {
      for (const c of intersections[i].cuts) {
        if (c.strokeIdx === si) {
          splits.push({ pos: c.pos, nodeIdx: i, x: intersections[i].x, y: intersections[i].y });
        }
      }
    }
    splits.sort((a, b) => a.pos - b.pos);

    // Add endpoint nodes only if no intersection is already at that position
    const hasStartIx = splits.length > 0 && splits[0].pos < 0.5;
    const hasEndIx = splits.length > 0 && splits[splits.length - 1].pos > numSegs - 0.5;

    const allSplits = [];
    if (!hasStartIx) {
      const ni = nodes.length;
      nodes.push({ x: pts[0].x, y: pts[0].y, endpoint: true });
      allSplits.push({ pos: 0, nodeIdx: ni, x: pts[0].x, y: pts[0].y });
    }
    allSplits.push(...splits);
    if (!hasEndIx) {
      const ni = nodes.length;
      nodes.push({ x: pts[numSegs].x, y: pts[numSegs].y, endpoint: true });
      allSplits.push({ pos: numSegs, nodeIdx: ni, x: pts[numSegs].x, y: pts[numSegs].y });
    }

    for (let j = 0; j < allSplits.length - 1; j++) {
      const from = allSplits[j], to = allSplits[j + 1];
      if (to.pos - from.pos < 0.01) continue; // skip zero-length arcs

      // Collect arc points
      const arcPts = [{ x: from.x, y: from.y }];
      const lo = Math.ceil(from.pos + 0.001);
      const hi = Math.floor(to.pos - 0.001);
      for (let k = Math.max(0, lo); k <= Math.min(numSegs, hi); k++) {
        arcPts.push(pts[k]);
      }
      arcPts.push({ x: to.x, y: to.y });

      // Deduplicate adjacent points
      const clean = [arcPts[0]];
      for (let k = 1; k < arcPts.length; k++) {
        if (dist(arcPts[k-1].x, arcPts[k-1].y, arcPts[k].x, arcPts[k].y) > 0.1)
          clean.push(arcPts[k]);
      }
      if (clean.length < 2) continue;

      const h1 = halfEdges.length, h2 = h1 + 1;
      const a1 = Math.atan2(clean[1].y - clean[0].y, clean[1].x - clean[0].x);
      const last = clean[clean.length - 1], prev = clean[clean.length - 2];
      const a2 = Math.atan2(prev.y - last.y, prev.x - last.x);

      halfEdges.push({ id: h1, origin: from.nodeIdx, twin: h2, next: -1, face: -1, angle: a1, points: clean });
      halfEdges.push({ id: h2, origin: to.nodeIdx,   twin: h1, next: -1, face: -1, angle: a2, points: [...clean].reverse() });
    }
  }

  if (!halfEdges.length) { updateSidebar(); return; }

  // Merge degree-2 nodes (e.g. closure points) to avoid ambiguous angle sort
  const deg2 = {};
  for (const he of halfEdges) {
    (deg2[he.origin] || (deg2[he.origin] = [])).push(he);
  }
  for (const ni in deg2) {
    const outs = deg2[ni];
    if (outs.length !== 2) continue;
    const ha = outs[0], hb = outs[1];
    const ha_t = halfEdges[ha.twin], hb_t = halfEdges[hb.twin];
    // Skip self-loops or parallel edges to same destination
    if (ha_t.origin === hb_t.origin) continue;
    // Merge: ha_t (→ni) + hb (ni→) into one edge, and hb_t (→ni) + ha (ni→) into one edge
    const pts1 = [...ha_t.points];
    for (let k = 1; k < hb.points.length; k++) pts1.push(hb.points[k]);
    const pts2 = [...hb_t.points];
    for (let k = 1; k < ha.points.length; k++) pts2.push(ha.points[k]);
    ha_t.points = pts1;
    ha_t.angle = Math.atan2(pts1[1].y - pts1[0].y, pts1[1].x - pts1[0].x);
    ha_t.twin = hb_t.id;
    hb_t.points = pts2;
    hb_t.angle = Math.atan2(pts2[1].y - pts2[0].y, pts2[1].x - pts2[0].x);
    hb_t.twin = ha_t.id;
    ha.deleted = true;
    hb.deleted = true;
  }

  // Link half-edges at each node: sort outgoing by INCREASING angle (screen coords, Y down)
  const byNode = {};
  for (const he of halfEdges) {
    if (he.deleted) continue;
    (byNode[he.origin] || (byNode[he.origin] = [])).push(he);
  }
  for (const ni in byNode) {
    const out = byNode[ni];
    out.sort((a, b) => a.angle - b.angle || a.id - b.id);
    for (let i = 0; i < out.length; i++) {
      halfEdges[out[i].twin].next = out[(i + 1) % out.length].id;
    }
  }

  // Trace faces
  const visited = new Set();
  const faces = [];
  for (const he of halfEdges) {
    if (he.deleted) continue;
    if (visited.has(he.id)) continue;
    const faceHEs = [];
    let cur = he, safety = halfEdges.length + 2;
    while (!visited.has(cur.id) && safety-- > 0) {
      visited.add(cur.id);
      faceHEs.push(cur);
      if (cur.next < 0) break;
      cur = halfEdges[cur.next];
    }
    // Build polygon
    const poly = [];
    for (const fhe of faceHEs) {
      for (let k = 0; k < fhe.points.length - 1; k++) poly.push(fhe.points[k]);
    }
    if (poly.length < 3) continue;

    // Signed area (screen coords: positive = bounded face, outer face is most negative)
    let area = 0;
    for (let i = 0; i < poly.length; i++) {
      const j = (i + 1) % poly.length;
      area += (poly[j].x - poly[i].x) * (poly[j].y + poly[i].y);
    }
    area /= 2;

    const fi = faces.length;
    for (const fhe of faceHEs) halfEdges[fhe.id].face = fi;
    faces.push({ polygon: poly, area, heIds: faceHEs.map(h => h.id) });
  }

  if (!faces.length) { updateSidebar(); return; }

  // Outer faces: all faces with negative signed area (counterclockwise in screen coords)
  const outerFaces = new Set();
  for (let i = 0; i < faces.length; i++) {
    if (faces[i].area < 0) outerFaces.add(i);
  }
  // Fallback: if none negative, use largest |area|
  if (!outerFaces.size) {
    let outerIdx = 0, maxA = 0;
    for (let i = 0; i < faces.length; i++) {
      if (Math.abs(faces[i].area) > maxA) { maxA = Math.abs(faces[i].area); outerIdx = i; }
    }
    outerFaces.add(outerIdx);
  }

  // Adjacency
  const adj = faces.map(() => new Set());
  for (const he of halfEdges) {
    if (he.deleted) continue;
    const f1 = he.face, f2 = halfEdges[he.twin].face;
    if (f1 >= 0 && f2 >= 0 && f1 !== f2) { adj[f1].add(f2); adj[f2].add(f1); }
  }

  // 2-color attempt (BFS from all outer faces)
  const colors = new Array(faces.length).fill(-1);
  const q = [];
  for (const oi of outerFaces) { colors[oi] = 0; q.push(oi); }
  let bipartite = true, qi = 0;
  while (qi < q.length) {
    const fi = q[qi++];
    for (const ni of adj[fi]) {
      if (colors[ni] === -1) { colors[ni] = 1 - colors[fi]; q.push(ni); }
      else if (colors[ni] === colors[fi]) bipartite = false;
    }
  }

  // Greedy fallback if not bipartite
  if (!bipartite) {
    colors.fill(-1);
    for (const oi of outerFaces) colors[oi] = 0;
    for (let i = 0; i < faces.length; i++) {
      if (colors[i] >= 0) continue;
      const used = new Set();
      for (const ni of adj[i]) { if (colors[ni] >= 0) used.add(colors[ni]); }
      let c = 0;
      while (used.has(c)) c++;
      colors[i] = c;
    }
  }

  // Unvisited faces default to non-background
  for (let i = 0; i < faces.length; i++) { if (colors[i] < 0) colors[i] = 1; }

  // Build regions (skip outer, skip background-colored, skip tiny faces)
  const faceToRegion = {};
  for (let i = 0; i < faces.length; i++) {
    if (outerFaces.has(i)) continue;
    if (colors[i] === 0) continue;
    if (Math.abs(faces[i].area) < 80) continue;
    const rg = {
      id: nextRegionId++,
      polygon: faces[i].polygon,
      color: REGION_PALETTE[colors[i]] || REGION_PALETTE[1],
      area: Math.abs(faces[i].area)
    };
    faceToRegion[i] = rg.id;
    regions.push(rg);
  }

  // Build node label map: intersection nodes use #id, endpoints use "ep"
  const nodeLabel = {};
  for (let i = 0; i < nodes.length; i++) {
    if (i < intersections.length) {
      nodeLabel[i] = '#' + intersections[i].id;
    } else {
      nodeLabel[i] = 'ep';
    }
  }

  // Persist DCEL data for hover
  dcelEdges = [];
  const seen = new Set();
  for (const he of halfEdges) {
    if (he.deleted) continue;
    if (seen.has(he.id)) continue;
    seen.add(he.id); seen.add(he.twin);
    const twin = halfEdges[he.twin];
    dcelEdges.push({
      id: he.id, twinId: he.twin,
      points: he.points,
      originNode: nodeLabel[he.origin] || he.origin,
      destNode: nodeLabel[twin.origin] || twin.origin,
      face: he.face, twinFace: twin.face,
      faceRegion: faceToRegion[he.face] || null,
      twinFaceRegion: faceToRegion[twin.face] || null
    });
  }

  dcelFaces = [];
  for (let i = 0; i < faces.length; i++) {
    const adjSet = adj[i];
    dcelFaces.push({
      id: i,
      polygon: faces[i].polygon,
      area: Math.abs(faces[i].area),
      isOuter: outerFaces.has(i),
      regionId: faceToRegion[i] || null,
      edgeCount: faces[i].heIds.length,
      adjFaces: [...adjSet]
    });
  }

  updateSidebar();
}

// === Sidebar ===

function updateSidebar() {
  ixListEl.innerHTML = intersections.map(ix =>
    `<div class="ix-entry" data-id="${ix.id}" id="ix-${ix.id}">` +
    `<b>#${ix.id}</b> (${ix.x.toFixed(0)},${ix.y.toFixed(0)})</div>`
  ).join('');

  lineListEl.innerHTML = strokes.map((s, i) => {
    const segs = getStrokeSegs(i);
    if (!segs.length) return '';
    const p0 = { x: segs[0].x1, y: segs[0].y1 };
    const pN = { x: segs[segs.length-1].x2, y: segs[segs.length-1].y2 };
    const len = segs.reduce((sum, seg) => sum + dist(seg.x1, seg.y1, seg.x2, seg.y2), 0);
    return `<div class="ln-entry">L${i} (${p0.x.toFixed(0)},${p0.y.toFixed(0)})\u2192(${pN.x.toFixed(0)},${pN.y.toFixed(0)}) ${Math.round(len)}px</div>`;
  }).join('');

  regionListEl.innerHTML = regions.map(rg =>
    `<div class="rg-entry" id="rg-${rg.id}">` +
    `<span class="swatch" style="background:${rg.color || '#fff'}"></span>` +
    `R${rg.id} \u2014 ${Math.round(rg.area)}px\u00b2</div>`
  ).join('');
}

// === Rendering ===

function render() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(viewScale, 0, 0, viewScale, viewX, viewY);

  const lw = 1 / viewScale; // scale-compensated unit

  const showReg = showRegionsCb.checked;
  const showLbl = showRegionLabelsCb.checked;
  const showIx = showCrossingsCb.checked;
  const showPath = showPathsCb.checked;

  // Regions (filled, behind curves)
  if (showReg) {
    for (const rg of regions) {
      if (rg.polygon.length < 3) continue;
      const isHov = hoveredRegion === rg.id;
      ctx.fillStyle = isHov ? rg.color.replace('0.92', '1.0').replace('0.22', '0.45') : rg.color;
      ctx.beginPath();
      ctx.moveTo(rg.polygon[0].x, rg.polygon[0].y);
      for (let i = 1; i < rg.polygon.length; i++) ctx.lineTo(rg.polygon[i].x, rg.polygon[i].y);
      ctx.closePath();
      ctx.fill();
      if (isHov) {
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1.5 * lw;
        ctx.stroke();
      }
    }
  }

  // Region labels (centroid)
  if (showReg && showLbl) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = `${11 * lw}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const rg of regions) {
      if (rg.polygon.length < 3) continue;
      let cx = 0, cy = 0;
      for (const p of rg.polygon) { cx += p.x; cy += p.y; }
      cx /= rg.polygon.length; cy /= rg.polygon.length;
      ctx.fillText(`R${rg.id}`, cx, cy);
    }
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }

  // Strokes
  if (showPath) {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2 * lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let si = 0; si < strokes.length; si++) {
      const segs = getStrokeSegs(si);
      if (!segs.length) continue;
      ctx.beginPath();
      ctx.moveTo(segs[0].x1, segs[0].y1);
      for (const s of segs) ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
    }
  }

  // Hovered edge highlight
  if (hoveredEdge) {
    const pts = hoveredEdge.points;
    ctx.strokeStyle = '#e8a000';
    ctx.lineWidth = 5 * lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  // Stroke start markers
  if (showPath) {
    ctx.fillStyle = '#555';
    for (const stroke of strokes) {
      if (stroke.length > 0) {
        ctx.beginPath();
        ctx.arc(stroke[0].x, stroke[0].y, 3 * lw, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Intersection markers
  if (showIx) {
    for (const ix of intersections) {
      const hov = hoveredIx === ix.id;
      const r = (hov ? 5 : 3) * lw;
      ctx.fillStyle = hov ? '#e8a000' : '#d04050';
      ctx.beginPath();
      ctx.arc(ix.x, ix.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.font = `${10 * lw}px monospace`;
      ctx.fillText(`#${ix.id}`, ix.x + r + 3 * lw, ix.y - r);
    }
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);

  // Alternating mode skip cursor: hollow circle at mouse position
  if (alternating && lastPointerPos && !altDrawing) {
    const sp = worldToScreen(lastPointerPos.ox, lastPointerPos.oy);
    ctx.strokeStyle = 'rgba(100,100,100,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// === Input ===

// Find first crossing of segment (ax1,ay1)-(ax2,ay2) with existing lines.
// Returns {x, y, seg, t, u} or null. Optionally exclude a stroke.
function findLineCrossing(ax1, ay1, ax2, ay2, excludeSi) {
  let best = null, bestT = Infinity;
  for (const seg of allSegments) {
    if (seg.strokeIdx === excludeSi) continue;
    const hit = segIntersect(ax1, ay1, ax2, ay2, seg.x1, seg.y1, seg.x2, seg.y2);
    if (hit && hit.t < bestT) { bestT = hit.t; best = { x: hit.x, y: hit.y, seg, t: hit.t, u: hit.u }; }
  }
  return best;
}

// Register an intersection created by alternating mode at a crossing point
function registerAltIntersection(crossing, newSi, posOnNew) {
  if (intersections.some(ix => dist(ix.x, ix.y, crossing.x, crossing.y) < 5)) return;
  intersections.push({
    x: crossing.x, y: crossing.y, id: nextIxId++,
    cuts: [
      { strokeIdx: crossing.seg.strokeIdx, pos: crossing.seg.seqIdx + crossing.u },
      { strokeIdx: newSi, pos: posOnNew }
    ]
  });
}

canvas.addEventListener('pointerdown', e => {
  // Middle-click or Ctrl+left-click: start panning
  if (e.button === 1 || (e.button === 0 && e.ctrlKey)) {
    e.preventDefault();
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panViewX0 = viewX; panViewY0 = viewY;
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  if (e.button !== 0) return;
  if (alternating) return; // alternating mode doesn't use mouse button
  canvas.setPointerCapture(e.pointerId);
  pointerDown = true;
  const w = screenToWorld(e.offsetX, e.offsetY);
  inputBuffer.push({ type: 'down', x: w.x, y: w.y });
});
canvas.addEventListener('pointermove', e => {
  if (panning) {
    viewX = panViewX0 + (e.clientX - panStartX);
    viewY = panViewY0 + (e.clientY - panStartY);
    return;
  }

  const w = screenToWorld(e.offsetX, e.offsetY);
  lastPointerPos = { x: e.clientX, y: e.clientY, ox: w.x, oy: w.y };

  if (alternating) {
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ce of events) {
      const cw = screenToWorld(ce.offsetX, ce.offsetY);
      inputBuffer.push({ type: 'altmove', x: cw.x, y: cw.y });
    }
    return;
  }

  if (!pointerDown) return;
  const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  for (const ce of events) {
    const cw = screenToWorld(ce.offsetX, ce.offsetY);
    inputBuffer.push({ type: 'move', x: cw.x, y: cw.y });
  }
});
canvas.addEventListener('pointerup', e => {
  if (panning) { panning = false; return; }
  if (alternating) return;
  pointerDown = false;
  inputBuffer.push({ type: 'up' });
});
canvas.addEventListener('pointerleave', () => {
  if (alternating) {
    // Stop drawing if active in alternating mode
    if (altDrawing) { inputBuffer.push({ type: 'up' }); altDrawing = false; }
    altPrevPos = null;
  } else {
    if (pointerDown) { pointerDown = false; inputBuffer.push({ type: 'up' }); }
  }
  lastPointerPos = null; hoveredIx = null; tooltip.style.display = 'none';
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const mx = e.offsetX, my = e.offsetY;
  viewX = mx - (mx - viewX) * factor;
  viewY = my - (my - viewY) * factor;
  viewScale *= factor;
}, { passive: false });

clearBtn.addEventListener('click', () => {
  strokes = []; allSegments = []; currentStroke = null;
  intersections = []; regions = []; dcelEdges = []; dcelFaces = [];
  nextIxId = 1; nextRegionId = 1;
  hoveredIx = null; hoveredEdge = null; hoveredRegion = null;
  drawing = false; inputBuffer = [];
  altDrawing = false; altPrevPos = null;
  viewX = 0; viewY = 0; viewScale = 1;
  tooltip.style.display = 'none';
  updateSidebar(); render();
});

function toggleAlternating() {
  alternating = !alternating;
  altBtn.classList.toggle('active', alternating);
  modeLabel.textContent = 'alternating: ' + (alternating ? 'on' : 'off');
  if (!alternating) {
    // Turning off: stop any in-progress alternating drawing
    if (altDrawing) { inputBuffer.push({ type: 'up' }); altDrawing = false; }
    altPrevPos = null;
  } else {
    // Turning on: stop any normal drawing
    if (drawing) { inputBuffer.push({ type: 'up' }); }
    pointerDown = false;
    altPrevPos = null;
  }
}
altBtn.addEventListener('click', toggleAlternating);
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => { if (e.button === 1) e.preventDefault(); });
canvas.addEventListener('pointerdown', e => { if (e.button === 2) toggleAlternating(); }, true);

// === Animation loop ===

function addPointToStroke(x, y) {
  if (!currentStroke) return;
  const prev = currentStroke[currentStroke.length - 1];
  if (dist(prev.x, prev.y, x, y) <= 4 / viewScale) return;
  currentStroke.push({ x, y });
  const si = strokes.length - 1;
  if (currentStroke.length >= 2) {
    const prevCount = allSegments.filter(s => s.strokeIdx === si).length;
    const prevIx = intersections.length;
    rebuildStrokeSegments(si);
    checkForIntersections(si, prevCount);
    if (intersections.length > prevIx) rebuildRegions();
  }
}

function snapStrokeEnd(si) {
  const stroke = strokes[si];
  if (!stroke || stroke.length < 2) return;
  const end = stroke[stroke.length - 1];
  const SNAP_R = 15 / viewScale;

  // Check existing intersections
  let bestTarget = null, bestDist = SNAP_R;
  for (const ix of intersections) {
    const d = dist(end.x, end.y, ix.x, ix.y);
    if (d < bestDist) { bestDist = d; bestTarget = { x: ix.x, y: ix.y, isIx: true, ix }; }
  }

  // Check stroke start points (including own start for closing loops)
  for (let i = 0; i < strokes.length; i++) {
    const s = strokes[i];
    if (s.length > 0) {
      // For own stroke, only snap if the stroke is long enough to form a real loop
      if (i === si && s.length < 10) continue;
      const d = dist(end.x, end.y, s[0].x, s[0].y);
      if (d < bestDist) { bestDist = d; bestTarget = { x: s[0].x, y: s[0].y, isIx: false, strokeIdx: i }; }
    }
  }

  if (!bestTarget) return;

  // Snap endpoint
  stroke[stroke.length - 1] = { x: bestTarget.x, y: bestTarget.y };
  rebuildStrokeSegments(si);
  const prevCount = allSegments.filter(s => s.strokeIdx === si).length;
  checkForIntersections(si, prevCount);

  if (!bestTarget.isIx) {
    // Snapped to a bare stroke start — create a new intersection node there
    if (!intersections.some(ix => dist(ix.x, ix.y, bestTarget.x, bestTarget.y) < 5)) {
      const segs = getStrokeSegs(si);
      const endPos = segs.length;
      intersections.push({
        x: bestTarget.x, y: bestTarget.y, id: nextIxId++,
        cuts: [
          { strokeIdx: si, pos: endPos },
          { strokeIdx: bestTarget.strokeIdx, pos: 0 }
        ]
      });
    }
  }

  rebuildRegions();
}

function processInput() {
  const buf = inputBuffer;
  inputBuffer = [];
  for (const evt of buf) {
    if (evt.type === 'altmove') {
      const cur = { x: evt.x, y: evt.y };
      if (altPrevPos) {
        const excludeSi = altDrawing ? strokes.length - 1 : -1;
        const crossing = findLineCrossing(altPrevPos.x, altPrevPos.y, cur.x, cur.y, excludeSi);
        if (crossing) {
          if (altDrawing) {
            // Stop drawing: snap endpoint to crossing
            currentStroke.push({ x: crossing.x, y: crossing.y });
            const si = strokes.length - 1;
            const prevCount = allSegments.filter(s => s.strokeIdx === si).length;
            rebuildStrokeSegments(si);
            checkForIntersections(si, prevCount);
            const endPos = getStrokeSegs(si).length;
            registerAltIntersection(crossing, si, endPos);
            rebuildRegions();
            altDrawing = false;
            drawing = false;
            currentStroke = null;
          } else {
            // Start drawing: snap startpoint to crossing
            altDrawing = true;
            drawing = true;
            currentStroke = [{ x: crossing.x, y: crossing.y }];
            strokes.push(currentStroke);
            registerAltIntersection(crossing, strokes.length - 1, 0);
          }
        }
      }
      if (altDrawing && drawing && currentStroke) {
        addPointToStroke(cur.x, cur.y);
      }
      altPrevPos = cur;
    } else if (evt.type === 'down') {
      drawing = true;
      let sx = evt.x, sy = evt.y;
      // Snap start to nearby intersection or stroke start
      let bestD = 15 / viewScale;
      for (const ix of intersections) {
        const d = dist(sx, sy, ix.x, ix.y);
        if (d < bestD) { bestD = d; sx = ix.x; sy = ix.y; }
      }
      for (const s of strokes) {
        if (s.length > 0) {
          const d = dist(sx, sy, s[0].x, s[0].y);
          if (d < bestD) { bestD = d; sx = s[0].x; sy = s[0].y; }
        }
      }
      currentStroke = [{ x: sx, y: sy }];
      strokes.push(currentStroke);
    } else if (evt.type === 'move' && drawing && currentStroke) {
      addPointToStroke(evt.x, evt.y);
    } else if (evt.type === 'up') {
      if (drawing && currentStroke && currentStroke.length >= 2) {
        snapStrokeEnd(strokes.length - 1);
      }
      drawing = false;
      currentStroke = null;
      altDrawing = false;
      updateSidebar();
    }
  }
}

function clearHoverState() {
  hoveredIx = null; hoveredEdge = null; hoveredRegion = null;
  tooltip.style.display = 'none';
  document.querySelectorAll('.ix-entry,.rg-entry').forEach(el => el.classList.remove('hovered'));
}

function updateHover() {
  if (!lastPointerPos || drawing) {
    if (drawing && (hoveredIx || hoveredEdge || hoveredRegion)) clearHoverState();
    return;
  }
  const mx = lastPointerPos.ox, my = lastPointerPos.oy;
  const tx = lastPointerPos.x, ty = lastPointerPos.y;

  const hoverR = 8 / viewScale; // scale-compensated hover radius

  // Priority 1: vertex (intersection)
  let closestIx = null, bestIxD = hoverR;
  for (const ix of intersections) {
    const d = dist(mx, my, ix.x, ix.y);
    if (d < bestIxD) { bestIxD = d; closestIx = ix; }
  }
  if (closestIx) {
    if (hoveredIx !== closestIx.id || hoveredEdge || hoveredRegion) {
      clearHoverState();
      hoveredIx = closestIx.id;
      const el = document.getElementById('ix-' + closestIx.id);
      if (el) { el.classList.add('hovered'); el.scrollIntoView({ block: 'nearest' }); }
    }
    tooltip.style.display = 'block';
    tooltip.style.left = (tx + 16) + 'px';
    tooltip.style.top = (ty - 10) + 'px';
    tooltip.textContent = `vertex #${closestIx.id}\npos: (${closestIx.x.toFixed(1)}, ${closestIx.y.toFixed(1)})`;
    return;
  }

  // Priority 2: edge (dart)
  let closestEdge = null, bestEdgeD = hoverR;
  for (const e of dcelEdges) {
    const d = distToPolyline(mx, my, e.points);
    if (d < bestEdgeD) { bestEdgeD = d; closestEdge = e; }
  }
  if (closestEdge) {
    if (!hoveredEdge || hoveredEdge.id !== closestEdge.id || hoveredIx || hoveredRegion) {
      clearHoverState();
      hoveredEdge = closestEdge;
    }
    const leftLabel = closestEdge.faceRegion ? `R${closestEdge.faceRegion}` : (closestEdge.face >= 0 ? 'ocean' : '?');
    const rightLabel = closestEdge.twinFaceRegion ? `R${closestEdge.twinFaceRegion}` : (closestEdge.twinFace >= 0 ? 'ocean' : '?');
    tooltip.style.display = 'block';
    tooltip.style.left = (tx + 16) + 'px';
    tooltip.style.top = (ty - 10) + 'px';
    tooltip.textContent = `edge (dart ${closestEdge.id}/${closestEdge.twinId})\nnode ${closestEdge.originNode} \u2192 ${closestEdge.destNode}\nfaces: ${leftLabel} | ${rightLabel}`;
    return;
  }

  // Priority 3: region (face)
  let hitRegion = null;
  for (const rg of regions) {
    if (rg.polygon.length < 3) continue;
    if (pointInPolygon(mx, my, rg.polygon)) { hitRegion = rg; break; }
  }
  if (hitRegion) {
    if (hoveredRegion !== hitRegion.id || hoveredIx || hoveredEdge) {
      clearHoverState();
      hoveredRegion = hitRegion.id;
      const el = document.getElementById('rg-' + hitRegion.id);
      if (el) { el.classList.add('hovered'); el.scrollIntoView({ block: 'nearest' }); }
    }
    // Find DCEL face for adjacency info
    const face = dcelFaces.find(f => f.regionId === hitRegion.id);
    const adjStr = face ? face.adjFaces.map(fi => {
      const af = dcelFaces[fi];
      return af && af.regionId ? `R${af.regionId}` : (af && af.isOuter ? 'ocean' : 'bg');
    }).join(', ') : '';
    tooltip.style.display = 'block';
    tooltip.style.left = (tx + 16) + 'px';
    tooltip.style.top = (ty - 10) + 'px';
    tooltip.textContent = `R${hitRegion.id}\narea: ${Math.round(hitRegion.area)}px\u00b2\nedges: ${face ? face.edgeCount : '?'}\nadj: ${adjStr || 'none'}`;
    return;
  }

  // Nothing hovered
  if (hoveredIx || hoveredEdge || hoveredRegion) clearHoverState();
}

function frame() {
  processInput();
  updateHover();
  render();
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
