<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            http-equiv="Cache-Control"
            content="no-cache, no-store, must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>coylean 3D core — test</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: #eaf4ff;
                color: #1a2a3a;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            #app {
                position: fixed;
                inset: 0;
            }

            #panel {
                position: fixed;
                top: 12px;
                left: 12px;
                bottom: 12px;
                width: 340px;
                background: rgba(255, 255, 255, 0.88);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(0, 0, 0, 0.08);
                border-radius: 10px;
                padding: 12px 14px;
                font-size: 13px;
                line-height: 1.45;
                box-shadow: 0 4px 18px rgba(0, 30, 80, 0.08);
                display: flex;
                flex-direction: column;
                gap: 6px;
                overflow: hidden;
            }

            #panel h1 {
                margin: 0 0 4px;
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            #panel .row {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            #panel label {
                flex: 1;
            }

            #panel input[type="number"],
            #panel select {
                background: #fff;
                border: 1px solid #b9c8d8;
                border-radius: 4px;
                padding: 1px 4px;
                font: inherit;
                color: #1a2a3a;
            }

            #panel input[type="number"] {
                width: 64px;
            }

            #panel button {
                background: #fff;
                border: 1px solid #b9c8d8;
                border-radius: 6px;
                padding: 4px 10px;
                cursor: pointer;
                font: inherit;
                color: #1a2a3a;
            }

            #panel button:hover {
                background: #f0f6ff;
            }

            #panel .hint {
                color: #557;
                font-size: 12px;
            }

            #panel .legend {
                font-size: 12px;
                color: #445;
            }

            #panel details.card {
                margin: 4px 0;
                border: 1px solid rgba(0, 0, 0, 0.08);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.4);
            }

            #panel details.card summary {
                cursor: pointer;
                padding: 4px 8px;
                user-select: none;
                font-weight: 600;
                list-style: none;
            }

            #panel details.card summary::-webkit-details-marker {
                display: none;
            }

            #panel details.card summary::before {
                content: "▸ ";
            }

            #panel details.card[open] summary::before {
                content: "▾ ";
            }

            #panel details.card .card-body {
                padding: 4px 8px 6px;
                border-top: 1px solid rgba(0, 0, 0, 0.06);
            }

            #panel details.card .card-body .row {
                margin: 4px 0;
            }

            #panel .legend .chip {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 2px;
                margin: 0 4px 0 0;
                vertical-align: middle;
            }

            #tests {
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
                font-size: 11.5px;
                line-height: 1.4;
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding-top: 8px;
                max-height: 220px;
                overflow: auto;
            }

            #tests .test {
                white-space: pre-wrap;
            }

            #tests .pass {
                color: #2a6a2a;
            }

            #tests .fail {
                color: #a02020;
                font-weight: 600;
            }

            #dump {
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
                font-size: 11.5px;
                line-height: 1.3;
                white-space: pre;
                border-top: 1px solid rgba(0, 0, 0, 0.08);
                padding-top: 8px;
                overflow: auto;
                flex: 1;
                margin: 0;
            }

            #summary {
                font-size: 12px;
                color: #445;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>

        <div id="panel">
            <a
                href="./"
                style="
                    display: inline-block;
                    color: #346;
                    text-decoration: none;
                    font-size: 12px;
                "
                >← 4D</a
            >
            <h1>coylean 3D core — test</h1>

            <div class="row">
                <label for="extent">extent N</label>
                <input id="extent" type="number" min="1" max="16" value="4" />
            </div>

            <div class="row">
                <label for="senSel">seniority</label>
                <select id="senSel">
                    <option value="0">A &gt; B &gt; C</option>
                    <option value="1">A &gt; C &gt; B</option>
                    <option value="2" selected>B &gt; A &gt; C</option>
                    <option value="3">B &gt; C &gt; A</option>
                    <option value="4">C &gt; A &gt; B</option>
                    <option value="5">C &gt; B &gt; A</option>
                </select>
            </div>

            <div class="row">
                <label for="aColor">A color</label>
                <select id="aColor">
                    <option value="red" selected>red</option>
                    <option value="amber">amber</option>
                    <option value="green">green</option>
                    <option value="blue">blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <div class="row">
                <label for="bColor">B color</label>
                <select id="bColor">
                    <option value="red">red</option>
                    <option value="amber">amber</option>
                    <option value="green">green</option>
                    <option value="blue" selected>blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <div class="row">
                <label for="cColor">C color</label>
                <select id="cColor">
                    <option value="red">red</option>
                    <option value="amber">amber</option>
                    <option value="green" selected>green</option>
                    <option value="blue">blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <details class="card" open>
                <summary>Ribbon</summary>
                <div class="card-body">
                    <div class="row">
                        <label for="widthPct">width %</label>
                        <input
                            id="widthPct"
                            type="number"
                            min="0"
                            max="100"
                            value="0"
                        />
                    </div>
                    <div class="row">
                        <label for="usePriority">use priority</label>
                        <input
                            id="usePriority"
                            type="checkbox"
                            checked
                        />
                    </div>
                    <div class="row">
                        <label for="transparencyPct">transparency %</label>
                        <input
                            id="transparencyPct"
                            type="number"
                            min="0"
                            max="100"
                            value="30"
                        />
                    </div>
                    <div class="row">
                        <label for="showRibbons">show ribbons</label>
                        <input id="showRibbons" type="checkbox" />
                    </div>
                    <div class="row">
                        <label for="showArrow">show arrow</label>
                        <input id="showArrow" type="checkbox" checked />
                    </div>
                    <div class="row">
                        <label for="showArrowhead">arrowhead</label>
                        <input id="showArrowhead" type="checkbox" />
                    </div>
                </div>
            </details>

            <div class="row">
                <button id="rerunBtn">rerun</button>
                <button id="projBtn">isometric</button>
                <button id="defaultsBtn">defaults</button>
                <span id="summary"></span>
            </div>

            <div class="legend" id="legend"></div>
            <div class="hint">drag to orbit · scroll to zoom</div>

            <div id="tests"></div>
            <pre id="dump"></pre>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import { LineSegments2 } from "three/addons/lines/LineSegments2.js";
            import { LineSegmentsGeometry } from "three/addons/lines/LineSegmentsGeometry.js";
            import { LineMaterial } from "three/addons/lines/LineMaterial.js";
            import {
                pri,
                Seniority3D,
                orderIndexFromPriorities,
                reactionFromPriority,
                reaction,
                propagate,
                propagateFromBoundary,
                Propagation,
                Row,
                Col,
                Layer,
            } from "./src/coylean-3d-core.js";
            import {
                currentRampFor,
                currentAxisRamps,
            } from "./src/oklch-ramps.js";

            // RAMP / COLOR_NAMES / currentRampFor / currentAxisRamps come
            // from src/oklch-ramps.js (canonical palette + per-axis lookup).

            // --- Assertions ---
            // Each test calls into the 3D core and throws on failure. The
            // suite runs once per rerun; the rendered status block is the
            // green-bar on the panel that catches regressions live.
            function assertEq(actual, expected, msg) {
                const ok =
                    JSON.stringify(actual) === JSON.stringify(expected);
                if (!ok) {
                    throw new Error(
                        `${msg}: got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)}`,
                    );
                }
            }

            function runTests() {
                const tests = [];
                const t = (name, fn) => {
                    try {
                        fn();
                        tests.push({ name, pass: true });
                    } catch (e) {
                        tests.push({ name, pass: false, error: e.message });
                    }
                };

                t("pri(0) === 100", () => assertEq(pri(0), 100, "pri(0)"));
                t("pri(1) === 0", () => assertEq(pri(1), 0, "pri(1)"));
                t("pri(2) === 1", () => assertEq(pri(2), 1, "pri(2)"));
                t("pri(4) === 2", () => assertEq(pri(4), 2, "pri(4)"));
                t("pri(8) === 3", () => assertEq(pri(8), 3, "pri(8)"));

                t("orderIndex distinct (3,2,1) → 0", () =>
                    assertEq(orderIndexFromPriorities(3, 2, 1), 0, "order"),
                );
                t("orderIndex distinct (1,2,3) → 5", () =>
                    assertEq(orderIndexFromPriorities(1, 2, 3), 5, "order"),
                );
                t("orderIndex distinct (2,1,3) → 4 (C>A>B)", () =>
                    assertEq(orderIndexFromPriorities(2, 1, 3), 4, "order"),
                );
                t("orderIndex tie A=B (aOverB) → 0", () =>
                    assertEq(
                        orderIndexFromPriorities(
                            2,
                            2,
                            1,
                            Seniority3D.aOverBOverC(),
                        ),
                        0,
                        "tie a>b",
                    ),
                );
                t("orderIndex tie A=B (bOverA) → 2", () =>
                    assertEq(
                        orderIndexFromPriorities(
                            2,
                            2,
                            1,
                            Seniority3D.bOverAOverC(),
                        ),
                        2,
                        "tie b>a",
                    ),
                );
                t("orderIndex all-tied (cOverBOverA) → 5", () =>
                    assertEq(
                        orderIndexFromPriorities(
                            1,
                            1,
                            1,
                            Seniority3D.cOverBOverA(),
                        ),
                        5,
                        "all tied",
                    ),
                );

                // 2D parity: with inward=false and layerPriority lower than
                // both, the in axis is irrelevant and reactionFromPriority
                // should reduce to the 2D Coylean reaction.
                t("reactionFromPriority 2D parity v=T h=T (downWins)", () =>
                    assertEq(
                        reactionFromPriority(true, true, false, 3, 2, 1),
                        [true, false, false],
                        "v+h, A>B",
                    ),
                );
                t("reactionFromPriority 2D parity v=T h=T (rightWins)", () =>
                    assertEq(
                        reactionFromPriority(true, true, false, 2, 3, 1),
                        [false, true, false],
                        "v+h, B>A",
                    ),
                );
                t("reactionFromPriority lone v winning spawns h", () =>
                    assertEq(
                        reactionFromPriority(true, false, false, 3, 2, 1),
                        [true, true, true],
                        "v alone, A>B>C cascade fires twice",
                    ),
                );
                t("reactionFromPriority all-three", () =>
                    assertEq(
                        reactionFromPriority(true, true, true, 3, 2, 1),
                        [true, false, true],
                        "all 3, A>B>C",
                    ),
                );

                t("reaction wrapper matches reactionFromPriority", () => {
                    const a = reaction(true, false, true, 1, 2, 3, 1, 1, 1);
                    const b = reactionFromPriority(
                        true,
                        false,
                        true,
                        pri(1 + 1),
                        pri(2 + 1),
                        pri(3 + 1),
                    );
                    assertEq(a, b, "reaction vs reactionFromPriority");
                });

                t("Propagation matrix shapes", () => {
                    const p = new Propagation({
                        numRows: 3,
                        numColumns: 4,
                        numLayers: 2,
                        hInitCol: 1,
                        vInitRow: 1,
                        iInitLay: 1,
                    });
                    assertEq(p.downMatrix.length, 4, "down j-len");
                    assertEq(p.downMatrix[0].length, 4, "down i-len");
                    assertEq(p.downMatrix[0][0].length, 2, "down k-len");
                    assertEq(p.rightMatrix.length, 5, "right i-len");
                    assertEq(p.rightMatrix[0].length, 3, "right j-len");
                    assertEq(p.rightMatrix[0][0].length, 2, "right k-len");
                    assertEq(p.inMatrix.length, 3, "in k-len");
                    assertEq(p.inMatrix[0].length, 4, "in i-len");
                    assertEq(p.inMatrix[0][0].length, 3, "in j-len");
                });

                t("Propagation precomputed priorities", () => {
                    const p = new Propagation({
                        numRows: 4,
                        numColumns: 4,
                        numLayers: 4,
                        hInitCol: 1,
                        vInitRow: 1,
                        iInitLay: 1,
                    });
                    assertEq(p.colPriority, [0, 1, 0, 2], "col");
                    assertEq(p.rowPriority, [0, 1, 0, 2], "row");
                    assertEq(p.layerPriority, [0, 1, 0, 2], "layer");
                });

                t("Propagation seeds match init faces", () => {
                    const p = new Propagation({
                        numRows: 2,
                        numColumns: 2,
                        numLayers: 2,
                        hInitCol: 1,
                        vInitRow: 1,
                        iInitLay: 1,
                    });
                    // All-true default: every (i, k) of initDown is true.
                    for (let i = 0; i < 2; i++) {
                        for (let k = 0; k < 2; k++) {
                            if (!p.initDown[i][k])
                                throw new Error(`initDown[${i}][${k}]`);
                            if (!p.initRight[i][k])
                                throw new Error(`initRight[${i}][${k}]`);
                            if (!p.initIn[i][k])
                                throw new Error(`initIn[${i}][${k}]`);
                        }
                    }
                });

                t("propagate() wrapper returns three matrices", () => {
                    const r = propagate(2, 2, 2);
                    if (!r.downMatrix || !r.rightMatrix || !r.inMatrix) {
                        throw new Error("missing matrix");
                    }
                });

                t("propagateFromBoundary roundtrips a custom init face", () => {
                    const initDown = [
                        new Layer(2).fill(false),
                        new Layer(2).fill(true),
                    ];
                    const initRight = [
                        new Layer(2).fill(true),
                        new Layer(2).fill(false),
                    ];
                    const initIn = [
                        new Row(2).fill(true),
                        new Row(2).fill(false),
                    ];
                    const r = propagateFromBoundary(
                        initDown,
                        initRight,
                        initIn,
                        1,
                        1,
                        1,
                    );
                    // First j-slice of downMatrix should equal initDown.
                    assertEq(
                        [...r.downMatrix[0][0]],
                        [false, false],
                        "init j=0 col=0",
                    );
                    assertEq(
                        [...r.downMatrix[0][1]],
                        [true, true],
                        "init j=0 col=1",
                    );
                });

                t("Row/Col/Layer toString glyphs", () => {
                    const r = new Row();
                    r.push(true, false, true);
                    assertEq(r.toString(), "|o|", "Row");
                    const c = new Col();
                    c.push(false, true, true);
                    assertEq(c.toString(), "o--", "Col");
                    const l = new Layer();
                    l.push(true, true, false);
                    assertEq(l.toString(), "**o", "Layer");
                });

                return tests;
            }

            function renderTests(tests) {
                const el = document.getElementById("tests");
                el.innerHTML = tests
                    .map((t) => {
                        const icon = t.pass ? "✓" : "✗";
                        const cls = t.pass ? "pass" : "fail";
                        const detail = t.error ? ` — ${t.error}` : "";
                        return `<div class="test ${cls}">${icon} ${t.name}${detail}</div>`;
                    })
                    .join("");
                const passed = tests.filter((t) => t.pass).length;
                document.getElementById("summary").textContent =
                    `${passed}/${tests.length} passing`;
            }

            // --- Scene ---
            const app = document.getElementById("app");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeaf4ff);
            scene.fog = new THREE.Fog(0xeaf4ff, 30, 80);

            const perspCamera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                200,
            );
            perspCamera.position.set(8, 6, 10);

            // Orthographic camera for isometric mode. Frustum extents are
            // resized in positionCamerasForN(); near/far is generous so the
            // grid never clips at any N within the panel's 1..16 range.
            const orthoCamera = new THREE.OrthographicCamera(
                -1, 1, 1, -1, -200, 200,
            );

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            app.appendChild(renderer.domElement);

            const savedFog = scene.fog;
            let isIsometric = false;
            let activeCamera = perspCamera;
            let controls = new OrbitControls(
                activeCamera,
                renderer.domElement,
            );
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;

            function setActiveCamera(cam) {
                if (controls) controls.dispose();
                activeCamera = cam;
                controls = new OrbitControls(
                    activeCamera,
                    renderer.domElement,
                );
                controls.enableDamping = true;
                controls.dampingFactor = 0.08;
                controls.target.set(0, 0, 0);
            }

            function positionCamerasForN(N) {
                // Perspective: same framing as before.
                perspCamera.position.set(N * 1.8, N * 1.4, N * 2.3);
                perspCamera.lookAt(0, 0, 0);

                // Orthographic: canonical isometric direction (1,1,1) at a
                // distance that doesn't matter for projection (ortho is
                // distance-invariant) but kept consistent with persp depth.
                const aspect = window.innerWidth / window.innerHeight;
                // Half-height in world units. The N-sized cube projects to
                // ~N*sqrt(2) wide and ~N*sqrt(6)/2 tall under iso, so N*1.1
                // half-height gives a small margin around the grid.
                const half = N * 1.1;
                orthoCamera.left = -half * aspect;
                orthoCamera.right = half * aspect;
                orthoCamera.top = half;
                orthoCamera.bottom = -half;
                orthoCamera.updateProjectionMatrix();
                const d = N * 2;
                orthoCamera.position.set(d, d, d);
                orthoCamera.lookAt(0, 0, 0);

                controls.target.set(0, 0, 0);
                controls.update();
            }

            function toggleProjection() {
                isIsometric = !isIsometric;
                setActiveCamera(isIsometric ? orthoCamera : perspCamera);
                // Fog is a depth cue that fights iso projection's
                // distance-invariant aesthetic — drop it when in ortho.
                scene.fog = isIsometric ? null : savedFog;
                const N = parseInt(
                    document.getElementById("extent").value,
                    10,
                );
                positionCamerasForN(N);
                document.getElementById("projBtn").textContent = isIsometric
                    ? "perspective"
                    : "isometric";
            }

            scene.add(new THREE.HemisphereLight(0xffffff, 0xdfeaff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 8, 6);
            scene.add(sun);

            const vizGroup = new THREE.Group();
            scene.add(vizGroup);

            const lineMaterials = [];

            // Per-axis references to the three visualization layers, so
            // toggles can flip their visibility without rebuilding the
            // scene. Each entry is the Mesh / LineSegments2 (or null
            // before the first rerun).
            const arrowLineMeshes = [null, null, null];
            const ribbonMeshes = [null, null, null];
            const arrowheadMeshes = [null, null, null];

            // Last rerun's propagation result + extent — cached so the
            // Ribbon-card sliders can rebuild geometry without redoing
            // the propagation.
            let cachedN = 4;
            let cachedProp = null;

            function clearViz() {
                while (vizGroup.children.length) {
                    const obj = vizGroup.children[0];
                    vizGroup.remove(obj);
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material && obj.material.dispose) {
                        obj.material.dispose();
                    }
                }
                lineMaterials.length = 0;
                arrowLineMeshes.fill(null);
                ribbonMeshes.fill(null);
                arrowheadMeshes.fill(null);
            }

            // Ribbon width tuning. Each grid cell is unit-sized, so the
            // base ribbon is 10 % of cell width; each pri unit adds
            // another 8 %. width % from the panel lerps that toward the
            // cell-width cap of 1.0.
            const TAPE_BASE = 0.1;
            const TAPE_PRI_INCREMENT = 0.08;
            const TAPE_MAX_WIDTH = 1.0;
            const ARROWHEAD_LEN = 0.22;
            const ARROWHEAD_HALF_W = 0.11;

            function tapeWidthForPriority(p) {
                const usePriority =
                    document.getElementById("usePriority").checked;
                const pct =
                    parseInt(
                        document.getElementById("widthPct").value,
                        10,
                    ) || 0;
                const priorityWidth =
                    TAPE_BASE +
                    (usePriority ? TAPE_PRI_INCREMENT * p : 0);
                return (
                    priorityWidth +
                    (TAPE_MAX_WIDTH - priorityWidth) * (pct / 100)
                );
            }

            // World-coordinate mapping:
            //   i (column) → world x, increasing (rightward)
            //   j (row)    → world y, decreasing (downward flow)
            //   k (layer)  → world z, decreasing (inward flow, away from cam)
            //
            // Grid cells span world coordinates centered on origin:
            //   X(i) = i - N/2, occupying [X(i), X(i)+1]
            //   Y(j) = N/2 - j, with cell j occupying [Y(j)-1, Y(j)]
            //   Z(k) = N/2 - k, with cell k occupying [Z(k)-1, Z(k)]
            //
            // Each true bit in the three matrices becomes one unit-length
            // line segment crossing the corresponding face of a cell.
            function rebuildViz(N, propResult) {
                clearViz();

                // Outer wireframe cube — same blue-ink palette as
                // reaction-box-3d.html.
                const cubeGeom = new THREE.BoxGeometry(N, N, N);
                const cubeEdgesGeom = new THREE.EdgesGeometry(cubeGeom);
                const cubeWire = new THREE.LineSegments(
                    cubeEdgesGeom,
                    new THREE.LineBasicMaterial({
                        color: 0x1a2a3a,
                        transparent: true,
                        opacity: 0.35,
                    }),
                );
                vizGroup.add(cubeWire);

                const X = (i) => i - N / 2;
                const Y = (j) => N / 2 - j;
                const Z = (k) => N / 2 - k;

                const positions = { vert: [], horz: [], in: [] };
                const { downMatrix, rightMatrix, inMatrix } = propResult;

                // Down arrows: downMatrix[j][i][k] is the arrow crossing
                // world plane y = Y(j), at column i and layer k. Render
                // as a unit-length segment straddling that plane.
                for (let j = 0; j < downMatrix.length; j++) {
                    for (let i = 0; i < downMatrix[j].length; i++) {
                        for (let k = 0; k < downMatrix[j][i].length; k++) {
                            if (!downMatrix[j][i][k]) continue;
                            const wx = X(i) + 0.5;
                            const wz = Z(k) - 0.5;
                            positions.vert.push(
                                wx,
                                Y(j) + 0.5,
                                wz,
                                wx,
                                Y(j) - 0.5,
                                wz,
                            );
                        }
                    }
                }

                // Right arrows: rightMatrix[i][j][k] crosses plane x = X(i).
                for (let i = 0; i < rightMatrix.length; i++) {
                    for (let j = 0; j < rightMatrix[i].length; j++) {
                        for (let k = 0; k < rightMatrix[i][j].length; k++) {
                            if (!rightMatrix[i][j][k]) continue;
                            const wy = Y(j) - 0.5;
                            const wz = Z(k) - 0.5;
                            positions.horz.push(
                                X(i) - 0.5,
                                wy,
                                wz,
                                X(i) + 0.5,
                                wy,
                                wz,
                            );
                        }
                    }
                }

                // In arrows: inMatrix[k][i][j] crosses plane z = Z(k).
                for (let k = 0; k < inMatrix.length; k++) {
                    for (let i = 0; i < inMatrix[k].length; i++) {
                        for (let j = 0; j < inMatrix[k][i].length; j++) {
                            if (!inMatrix[k][i][j]) continue;
                            const wx = X(i) + 0.5;
                            const wy = Y(j) - 0.5;
                            positions.in.push(
                                wx,
                                wy,
                                Z(k) + 0.5,
                                wx,
                                wy,
                                Z(k) - 0.5,
                            );
                        }
                    }
                }

                // Per-axis ribbon vertices + indices. Each true bit
                // pushes a 4-vertex flat rectangle in the tape's broad
                // plane, width depending on the axis-of-flow's pri at
                // that cell (colPriority[i] / rowPriority[j] /
                // layerPriority[k] for axes 0/1/2 respectively).
                const ribbonVerts = [[], [], []];
                const ribbonIdx = [[], [], []];
                const headVerts = [[], [], []];
                const headIdx = [[], [], []];

                function pushRect(axisGroup, axis, i, j, k, W) {
                    const halfW = W / 2;
                    const baseIdx = ribbonVerts[axisGroup].length / 3;
                    if (axis === 0) {
                        const yMid = Y(j) - 0.5;
                        const z = Z(k) - 0.5;
                        ribbonVerts[axisGroup].push(
                            X(i) - 0.5, yMid - halfW, z,
                            X(i) + 0.5, yMid - halfW, z,
                            X(i) + 0.5, yMid + halfW, z,
                            X(i) - 0.5, yMid + halfW, z,
                        );
                    } else if (axis === 1) {
                        const x = X(i) + 0.5;
                        const zMid = Z(k) - 0.5;
                        ribbonVerts[axisGroup].push(
                            x, Y(j) + 0.5, zMid - halfW,
                            x, Y(j) - 0.5, zMid - halfW,
                            x, Y(j) - 0.5, zMid + halfW,
                            x, Y(j) + 0.5, zMid + halfW,
                        );
                    } else {
                        const xMid = X(i) + 0.5;
                        const y = Y(j) - 0.5;
                        ribbonVerts[axisGroup].push(
                            xMid - halfW, y, Z(k) + 0.5,
                            xMid - halfW, y, Z(k) - 0.5,
                            xMid + halfW, y, Z(k) - 0.5,
                            xMid + halfW, y, Z(k) + 0.5,
                        );
                    }
                    ribbonIdx[axisGroup].push(
                        baseIdx, baseIdx + 1, baseIdx + 2,
                        baseIdx, baseIdx + 2, baseIdx + 3,
                    );
                }

                function pushHead(axis, i, j, k) {
                    const baseIdx = headVerts[axis].length / 3;
                    if (axis === 0) {
                        const tipX = X(i) + 0.5;
                        const baseY = Y(j) - 0.5;
                        const z = Z(k) - 0.5;
                        headVerts[axis].push(
                            tipX, baseY, z,
                            tipX - ARROWHEAD_LEN, baseY + ARROWHEAD_HALF_W, z,
                            tipX - ARROWHEAD_LEN, baseY - ARROWHEAD_HALF_W, z,
                        );
                    } else if (axis === 1) {
                        const x = X(i) + 0.5;
                        const tipY = Y(j) - 0.5;
                        const z = Z(k) - 0.5;
                        headVerts[axis].push(
                            x, tipY, z,
                            x, tipY + ARROWHEAD_LEN, z + ARROWHEAD_HALF_W,
                            x, tipY + ARROWHEAD_LEN, z - ARROWHEAD_HALF_W,
                        );
                    } else {
                        const x = X(i) + 0.5;
                        const y = Y(j) - 0.5;
                        const tipZ = Z(k) - 0.5;
                        headVerts[axis].push(
                            x, y, tipZ,
                            x + ARROWHEAD_HALF_W, y, tipZ + ARROWHEAD_LEN,
                            x - ARROWHEAD_HALF_W, y, tipZ + ARROWHEAD_LEN,
                        );
                    }
                    headIdx[axis].push(baseIdx, baseIdx + 1, baseIdx + 2);
                }

                // Walk every true bit a second time to seed the ribbon
                // and arrowhead batches.
                const cP = propResult.colPriority;
                const rP = propResult.rowPriority;
                const lP = propResult.layerPriority;
                for (let j = 0; j < downMatrix.length; j++) {
                    for (let i = 0; i < downMatrix[j].length; i++) {
                        for (let k = 0; k < downMatrix[j][i].length; k++) {
                            if (!downMatrix[j][i][k]) continue;
                            const W = tapeWidthForPriority(cP[i]);
                            pushRect(0, 1, i, j, k, W);
                            pushHead(1, i, j, k);
                        }
                    }
                }
                for (let i = 0; i < rightMatrix.length; i++) {
                    for (let j = 0; j < rightMatrix[i].length; j++) {
                        for (let k = 0; k < rightMatrix[i][j].length; k++) {
                            if (!rightMatrix[i][j][k]) continue;
                            const W = tapeWidthForPriority(rP[j]);
                            pushRect(1, 0, i, j, k, W);
                            pushHead(0, i, j, k);
                        }
                    }
                }
                for (let k = 0; k < inMatrix.length; k++) {
                    for (let i = 0; i < inMatrix[k].length; i++) {
                        for (let j = 0; j < inMatrix[k][i].length; j++) {
                            if (!inMatrix[k][i][j]) continue;
                            const W = tapeWidthForPriority(lP[k]);
                            pushRect(2, 2, i, j, k, W);
                            pushHead(2, i, j, k);
                        }
                    }
                }

                const linewidth = Math.max(1.5, 4.5 - Math.log2(N));
                const axisRamps = currentAxisRamps();

                // axis 0 = vertical (down), axis 1 = horizontal (right),
                // axis 2 = inward. Index here matches the page's
                // A/B/C ordering, so the line/ribbon/head for axis n all
                // use axisRamps[n].
                const linePositions = [
                    positions.vert,
                    positions.horz,
                    positions.in,
                ];
                for (let axis = 0; axis < 3; axis++) {
                    if (linePositions[axis].length > 0) {
                        const g = new LineSegmentsGeometry();
                        g.setPositions(linePositions[axis]);
                        const m = new LineMaterial({
                            color: axisRamps[axis].base,
                            linewidth,
                            transparent: true,
                            opacity: 0.85,
                        });
                        m.resolution.set(
                            window.innerWidth,
                            window.innerHeight,
                        );
                        lineMaterials.push(m);
                        const mesh = new LineSegments2(g, m);
                        arrowLineMeshes[axis] = mesh;
                        vizGroup.add(mesh);
                    }
                    if (ribbonVerts[axis].length > 0) {
                        const g = new THREE.BufferGeometry();
                        g.setAttribute(
                            "position",
                            new THREE.Float32BufferAttribute(
                                ribbonVerts[axis],
                                3,
                            ),
                        );
                        g.setIndex(ribbonIdx[axis]);
                        const m = new THREE.MeshBasicMaterial({
                            color: axisRamps[axis].base,
                            transparent: true,
                            opacity: 0.7,
                            side: THREE.DoubleSide,
                            depthWrite: false,
                        });
                        const mesh = new THREE.Mesh(g, m);
                        ribbonMeshes[axis] = mesh;
                        vizGroup.add(mesh);
                    }
                    if (headVerts[axis].length > 0) {
                        const g = new THREE.BufferGeometry();
                        g.setAttribute(
                            "position",
                            new THREE.Float32BufferAttribute(
                                headVerts[axis],
                                3,
                            ),
                        );
                        g.setIndex(headIdx[axis]);
                        const m = new THREE.MeshBasicMaterial({
                            color: axisRamps[axis].base,
                            side: THREE.DoubleSide,
                            depthWrite: false,
                        });
                        const mesh = new THREE.Mesh(g, m);
                        arrowheadMeshes[axis] = mesh;
                        vizGroup.add(mesh);
                    }
                }

                applyRibbonOpacity();
                applyVisibility();
            }

            // --- Legend ---
            // Rebuilds reactively from the current per-axis color selects.
            function buildLegend() {
                const el = document.getElementById("legend");
                const axisNames = ["vertical", "horizontal", "inward"];
                const axisLetters = ["A", "B", "C"];
                const axisRamps = currentAxisRamps();
                const items = axisRamps.map((ramp, idx) => {
                    const colorName = document.getElementById(
                        axisLetters[idx].toLowerCase() + "Color",
                    ).value;
                    const c =
                        "#" + ramp.base.toString(16).padStart(6, "0");
                    return (
                        `<span class="chip" style="background:${c}"></span>` +
                        `${axisLetters[idx]} · ${axisNames[idx]} · ${colorName}`
                    );
                });
                el.innerHTML = items.join("&nbsp;&nbsp;");
            }

            // --- Dump (text view of the three matrices) ---
            const ORDER_NAMES = [
                "A>B>C",
                "A>C>B",
                "B>A>C",
                "B>C>A",
                "C>A>B",
                "C>B>A",
            ];

            function dumpMatrices(N, propResult, orderIdx) {
                const { downMatrix, rightMatrix, inMatrix } = propResult;
                const lines = [];
                lines.push(
                    `# propagate(${N},${N},${N}, ` +
                        `seniority=${ORDER_NAMES[orderIdx]})`,
                );
                lines.push("");
                lines.push("## downMatrix[j][i] (each row = layer-k):");
                for (let j = 0; j < downMatrix.length; j++) {
                    lines.push(`j=${j}:`);
                    for (let i = 0; i < downMatrix[j].length; i++) {
                        lines.push(
                            "  i=" +
                                i +
                                "  " +
                                downMatrix[j][i].toString(),
                        );
                    }
                }
                lines.push("");
                lines.push("## rightMatrix[i][j] (each row = layer-k):");
                for (let i = 0; i < rightMatrix.length; i++) {
                    lines.push(`i=${i}:`);
                    for (let j = 0; j < rightMatrix[i].length; j++) {
                        lines.push(
                            "  j=" +
                                j +
                                "  " +
                                rightMatrix[i][j].toString(),
                        );
                    }
                }
                lines.push("");
                lines.push("## inMatrix[k][i] (each row = row-j):");
                for (let k = 0; k < inMatrix.length; k++) {
                    lines.push(`k=${k}:`);
                    for (let i = 0; i < inMatrix[k].length; i++) {
                        lines.push(
                            "  i=" +
                                i +
                                "  " +
                                inMatrix[k][i].toString(),
                        );
                    }
                }
                return lines.join("\n");
            }

            // --- Driver ---
            function rerun() {
                const N = Math.max(
                    1,
                    Math.min(
                        16,
                        parseInt(
                            document.getElementById("extent").value,
                            10,
                        ) || 4,
                    ),
                );
                const orderIdx = parseInt(
                    document.getElementById("senSel").value,
                    10,
                );
                const seniority = Seniority3D.fromOrderIndex(orderIdx);

                renderTests(runTests());
                buildLegend();

                // Use Propagation directly so the per-axis priority
                // arrays are exposed (rebuildViz uses them to size each
                // cell's ribbon).
                const prop = new Propagation({
                    numRows: N,
                    numColumns: N,
                    numLayers: N,
                    hInitCol: 1,
                    vInitRow: 1,
                    iInitLay: 1,
                    seniority,
                });
                const propResult = {
                    downMatrix: prop.downMatrix,
                    rightMatrix: prop.rightMatrix,
                    inMatrix: prop.inMatrix,
                    colPriority: prop.colPriority,
                    rowPriority: prop.rowPriority,
                    layerPriority: prop.layerPriority,
                };
                cachedN = N;
                cachedProp = propResult;
                rebuildViz(N, propResult);

                // Pull the camera back proportional to N so the grid
                // stays framed at any extent (works for both projections).
                positionCamerasForN(N);

                // Text dump is fast for small N; cap to avoid wall-of-text
                // at large N (still computed, just not shown).
                const dumpEl = document.getElementById("dump");
                if (N <= 6) {
                    dumpEl.textContent = dumpMatrices(
                        N,
                        propResult,
                        orderIdx,
                    );
                } else {
                    dumpEl.textContent =
                        `(matrix dump suppressed for N=${N}; ` +
                        `reduce to ≤ 6 to view)`;
                }
            }

            // --- Ribbon-card appliers ---
            function applyRibbonOpacity() {
                const t = parseInt(
                    document.getElementById("transparencyPct").value,
                    10,
                );
                const opacity = Math.max(0, Math.min(1, 1 - t / 100));
                for (const m of ribbonMeshes) {
                    if (m) m.material.opacity = opacity;
                }
            }

            function applyVisibility() {
                const showRibbon =
                    document.getElementById("showRibbons").checked;
                const showArrow =
                    document.getElementById("showArrow").checked;
                const showHead =
                    document.getElementById("showArrowhead").checked;
                for (let axis = 0; axis < 3; axis++) {
                    if (arrowLineMeshes[axis]) {
                        arrowLineMeshes[axis].visible = showArrow;
                    }
                    if (ribbonMeshes[axis]) {
                        ribbonMeshes[axis].visible = showRibbon;
                    }
                    if (arrowheadMeshes[axis]) {
                        arrowheadMeshes[axis].visible = showHead;
                    }
                }
            }

            // Width/use-priority changes recompute per-cell ribbon
            // widths, so we rebuild from the cached propagation rather
            // than redoing it.
            function rebuildRibbonsFromCache() {
                if (cachedProp) rebuildViz(cachedN, cachedProp);
            }

            document
                .getElementById("rerunBtn")
                .addEventListener("click", rerun);
            document
                .getElementById("extent")
                .addEventListener("change", rerun);
            document
                .getElementById("senSel")
                .addEventListener("change", rerun);
            document
                .getElementById("projBtn")
                .addEventListener("click", toggleProjection);
            for (const ax of ["a", "b", "c"]) {
                document
                    .getElementById(ax + "Color")
                    .addEventListener("change", rerun);
            }

            for (const id of ["widthPct", "usePriority"]) {
                document
                    .getElementById(id)
                    .addEventListener("change", rebuildRibbonsFromCache);
            }
            document
                .getElementById("transparencyPct")
                .addEventListener("change", applyRibbonOpacity);
            for (const id of ["showRibbons", "showArrow", "showArrowhead"]) {
                document
                    .getElementById(id)
                    .addEventListener("change", applyVisibility);
            }

            // Wheel-to-scrub on the two number boxes.
            function attachWheelStep(id, step, applyFn) {
                const el = document.getElementById(id);
                el.addEventListener(
                    "wheel",
                    (e) => {
                        e.preventDefault();
                        const delta = e.deltaY < 0 ? step : -step;
                        const min = parseInt(el.min || "0", 10);
                        const max = parseInt(el.max || "100", 10);
                        let v = parseInt(el.value, 10) || 0;
                        v = Math.max(min, Math.min(max, v + delta));
                        el.value = v;
                        applyFn();
                    },
                    { passive: false },
                );
            }
            attachWheelStep("widthPct", 5, rebuildRibbonsFromCache);
            attachWheelStep("transparencyPct", 5, applyRibbonOpacity);

            // Defaults button: restore every panel control to the value
            // declared in the HTML, then trigger a full rerun.
            const DEFAULTS = {
                extent: "4",
                senSel: "2",
                aColor: "red",
                bColor: "blue",
                cColor: "green",
                widthPct: "0",
                transparencyPct: "30",
                usePriority: true,
                showRibbons: false,
                showArrow: true,
                showArrowhead: false,
            };
            document
                .getElementById("defaultsBtn")
                .addEventListener("click", () => {
                    for (const [id, v] of Object.entries(DEFAULTS)) {
                        const el = document.getElementById(id);
                        if (typeof v === "boolean") el.checked = v;
                        else el.value = v;
                    }
                    rerun();
                });

            window.addEventListener("resize", () => {
                const aspect = window.innerWidth / window.innerHeight;
                perspCamera.aspect = aspect;
                perspCamera.updateProjectionMatrix();
                // Re-derive ortho frustum from the current extent so iso
                // mode stays framed across window resizes.
                const N = parseInt(
                    document.getElementById("extent").value,
                    10,
                );
                positionCamerasForN(N);
                renderer.setSize(window.innerWidth, window.innerHeight);
                for (const m of lineMaterials) {
                    m.resolution.set(window.innerWidth, window.innerHeight);
                }
            });

            rerun();

            function loop() {
                controls.update();
                renderer.render(scene, activeCamera);
                requestAnimationFrame(loop);
            }
            loop();
        </script>
    </body>
</html>
