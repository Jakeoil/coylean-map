<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <title>reaction box 3D — three.js</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                background: #eaf4ff;
                color: #1a2a3a;
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            #app {
                position: fixed;
                inset: 0;
            }

            #panel {
                position: fixed;
                top: 12px;
                left: 12px;
                background: rgba(255, 255, 255, 0.82);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(0, 0, 0, 0.08);
                border-radius: 10px;
                padding: 12px 14px;
                font-size: 13px;
                line-height: 1.45;
                min-width: 260px;
                box-shadow: 0 4px 18px rgba(0, 30, 80, 0.08);
            }

            #panel h1 {
                margin: 0 0 8px;
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            #panel .row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
            }

            #panel label {
                flex: 1;
            }

            #panel select {
                background: #fff;
                border: 1px solid #b9c8d8;
                border-radius: 4px;
                padding: 1px 4px;
                font: inherit;
                color: #1a2a3a;
            }

            #panel button {
                background: #fff;
                border: 1px solid #b9c8d8;
                border-radius: 6px;
                padding: 4px 10px;
                cursor: pointer;
                font: inherit;
                color: #1a2a3a;
            }

            #panel button:hover {
                background: #f0f6ff;
            }

            #panel .hint {
                color: #557;
                font-size: 12px;
                margin-top: 6px;
            }

            #panel .legend {
                margin-top: 8px;
                font-size: 12px;
                color: #445;
            }

            #panel .legend .chip {
                display: inline-block;
                width: 10px;
                height: 10px;
                border-radius: 2px;
                margin: 0 4px 0 0;
                vertical-align: middle;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>

        <div id="panel">
            <a
                href="./"
                style="
                    display: inline-block;
                    margin-bottom: 6px;
                    color: #346;
                    text-decoration: none;
                    font-size: 12px;
                "
                >← 4D</a
            >
            <h1>reaction box (3D)</h1>

            <div class="row">
                <label for="aOffset">A offset (y)</label>
                <select id="aOffset">
                    <option value="1" selected>1 (pri 0)</option>
                    <option value="2">2 (pri 1)</option>
                    <option value="3">3 (pri 0)</option>
                    <option value="4">4 (pri 2)</option>
                    <option value="5">5 (pri 0)</option>
                    <option value="6">6 (pri 1)</option>
                    <option value="7">7 (pri 0)</option>
                    <option value="8">8 (pri 3)</option>
                </select>
            </div>

            <div class="row">
                <label for="bOffset">B offset (x)</label>
                <select id="bOffset">
                    <option value="1" selected>1 (pri 0)</option>
                    <option value="2">2 (pri 1)</option>
                    <option value="3">3 (pri 0)</option>
                    <option value="4">4 (pri 2)</option>
                    <option value="5">5 (pri 0)</option>
                    <option value="6">6 (pri 1)</option>
                    <option value="7">7 (pri 0)</option>
                    <option value="8">8 (pri 3)</option>
                </select>
            </div>

            <div class="row">
                <label for="cOffset">C offset (z)</label>
                <select id="cOffset">
                    <option value="1" selected>1 (pri 0)</option>
                    <option value="2">2 (pri 1)</option>
                    <option value="3">3 (pri 0)</option>
                    <option value="4">4 (pri 2)</option>
                    <option value="5">5 (pri 0)</option>
                    <option value="6">6 (pri 1)</option>
                    <option value="7">7 (pri 0)</option>
                    <option value="8">8 (pri 3)</option>
                </select>
            </div>

            <div class="row">
                <label for="aColor">A color (y)</label>
                <select id="aColor">
                    <option value="red" selected>red</option>
                    <option value="amber">amber</option>
                    <option value="green">green</option>
                    <option value="blue">blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <div class="row">
                <label for="bColor">B color (x)</label>
                <select id="bColor">
                    <option value="red">red</option>
                    <option value="amber">amber</option>
                    <option value="green">green</option>
                    <option value="blue" selected>blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <div class="row">
                <label for="cColor">C color (z)</label>
                <select id="cColor">
                    <option value="red">red</option>
                    <option value="amber">amber</option>
                    <option value="green" selected>green</option>
                    <option value="blue">blue</option>
                    <option value="violet">violet</option>
                </select>
            </div>

            <div class="row">
                <button id="resetBtn">reset</button>
            </div>

            <div class="legend" id="legend"></div>
            <div class="hint">
                tie-break order: A &gt; B &gt; C (only consulted when
                axis offsets give equal pri values)
            </div>
            <div class="hint">
                click an emitter disc (−x / +y / +z face) to toggle its bit
            </div>
            <div class="hint">drag to orbit · scroll to zoom</div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import { Line2 } from "three/addons/lines/Line2.js";
            import { LineGeometry } from "three/addons/lines/LineGeometry.js";
            import { LineMaterial } from "three/addons/lines/LineMaterial.js";
            import { priority3 } from "./src/3-bit-priority-cnot-cascade.js";
            import {
                pri,
                Seniority3D,
                orderIndexFromPriorities,
            } from "./src/coylean-3d-core.js";
            import { currentRampFor } from "./src/oklch-ramps.js";

            // Page convention: 3D-axis index 0/1/2 = x/y/z, labelled B/A/C
            // in the reaction-box spec (A=y, B=x, C=z). axisRamp(i) reads
            // the matching <select> and returns its ramp.
            const AXIS_LETTERS = ["b", "a", "c"];
            function axisRamp(axis) {
                return currentRampFor(AXIS_LETTERS[axis]);
            }
            // AXIS_RAMPS is kept as the live snapshot of [ramp_x, ramp_y,
            // ramp_z] (3D-axis order). It's refreshed by applyAxisColors()
            // when any dropdown changes; initial values are taken from the
            // selects' default-selected options.
            const AXIS_RAMPS = [axisRamp(0), axisRamp(1), axisRamp(2)];

            // --- scene ---
            const app = document.getElementById("app");
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeaf4ff);
            scene.fog = new THREE.Fog(0xeaf4ff, 14, 30);

            const camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                100,
            );
            camera.position.set(4.0, 3.0, 5.0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            app.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;

            scene.add(new THREE.HemisphereLight(0xffffff, 0xdfeaff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 8, 6);
            scene.add(sun);

            // --- cube wireframe (extent [-1, 1]^3) ---
            const cubeGeom = new THREE.BoxGeometry(2, 2, 2);
            const cubeEdgesGeom = new THREE.EdgesGeometry(cubeGeom);
            const cubeWire = new THREE.LineSegments(
                cubeEdgesGeom,
                new THREE.LineBasicMaterial({
                    color: 0x1a2a3a,
                    transparent: true,
                    opacity: 0.45,
                }),
            );
            scene.add(cubeWire);

            // Three highlighted edges from the emitter corner (-1, +1, +1):
            // x runs right (B color), y runs down (A color), z runs inward
            // (C color). Initial Line2 colors are seeded from the live
            // ramps; applyAxisColors() recolors them on dropdown change.
            const STARTING_EDGES = [
                { axis: 0, a: [-1, 1, 1], b: [1, 1, 1] },
                { axis: 1, a: [-1, 1, 1], b: [-1, -1, 1] },
                { axis: 2, a: [-1, 1, 1], b: [-1, 1, -1] },
            ];

            const fatLineMats = [];
            for (const e of STARTING_EDGES) {
                const g = new LineGeometry();
                g.setPositions([...e.a, ...e.b]);
                const m = new LineMaterial({
                    color: axisRamp(e.axis).base,
                    linewidth: 5,
                    transparent: true,
                    opacity: 0.95,
                });
                m.resolution.set(window.innerWidth, window.innerHeight);
                fatLineMats.push(m);
                scene.add(new Line2(g, m));
            }

            const cornerSph = new THREE.Mesh(
                new THREE.SphereGeometry(0.06, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x1a2a3a }),
            );
            cornerSph.position.set(-1, 1, 1);
            scene.add(cornerSph);

            // --- port discs ---
            // The six reaction-box ports: emitter at the -axis face center
            // (the input bit), receiver at the +axis face center (the bit
            // after the priority CNOT cascade has run).
            const DISK_R = 0.1;
            const DISK_SEG = 48;
            const _diskFilledGeom = new THREE.CircleGeometry(
                DISK_R,
                DISK_SEG,
            );
            const _diskOutlineGeom = new THREE.RingGeometry(
                DISK_R * 0.78,
                DISK_R,
                DISK_SEG,
            );
            const _diskShadowGeom = new THREE.RingGeometry(
                DISK_R * 1.08,
                DISK_R * 1.4,
                DISK_SEG,
            );

            function orientFor(axis) {
                if (axis === 0) return [0, Math.PI / 2, 0];
                if (axis === 1) return [-Math.PI / 2, 0, 0];
                return [0, 0, 0];
            }

            function makeDisk(position, axis, color, role, withShadow) {
                const group = new THREE.Group();
                group.position.set(...position);
                const [rx, ry, rz] = orientFor(axis);
                group.rotation.set(rx, ry, rz);

                const filled = new THREE.Mesh(
                    _diskFilledGeom,
                    new THREE.MeshBasicMaterial({
                        color,
                        side: THREE.DoubleSide,
                    }),
                );
                filled.userData = { axis, role };
                group.add(filled);

                const outline = new THREE.Mesh(
                    _diskOutlineGeom,
                    new THREE.MeshBasicMaterial({
                        color,
                        side: THREE.DoubleSide,
                    }),
                );
                outline.userData = { axis, role };
                group.add(outline);

                let shadow = null;
                if (withShadow) {
                    shadow = new THREE.Mesh(
                        _diskShadowGeom,
                        new THREE.MeshBasicMaterial({
                            color: 0x000000,
                            transparent: true,
                            opacity: 0.28,
                            side: THREE.DoubleSide,
                            depthWrite: false,
                        }),
                    );
                    group.add(shadow);
                }

                scene.add(group);
                return { group, filled, outline, shadow };
            }

            // Emitter face per axis: -x (B rightward), +y (A downward),
            // +z (C inward). Receiver sits on the opposite face.
            const EMITTER_SIGN = [-1, 1, 1];

            const emitters = [];
            const receivers = [];
            for (let axis = 0; axis < 3; axis++) {
                const ramp = AXIS_RAMPS[axis];
                const emPos = [0, 0, 0];
                emPos[axis] = EMITTER_SIGN[axis];
                const rcPos = [0, 0, 0];
                rcPos[axis] = -EMITTER_SIGN[axis];
                emitters[axis] = makeDisk(
                    emPos,
                    axis,
                    ramp.base,
                    "emitter",
                    true,
                );
                receivers[axis] = makeDisk(
                    rcPos,
                    axis,
                    ramp.base,
                    "receiver",
                    false,
                );
            }

            // --- tapes ---
            // Tape geometry constants. Ribbons start at the emitter disc's
            // diameter (so a pri-0 tape exactly inscribes the disc) and
            // widen with the axis's external pri value.
            const TAPE_BASE = DISK_R * 2;
            const TAPE_PRI_INCREMENT = 0.15;
            const TAPE_THICKNESS = 0.02;

            // The seniority tie-breaker. Used only when two or three of
            // the external offsets produce equal pri values. PERMS[2] in
            // priority3's table is [1, 0, 2] = bit-1 > bit-0 > bit-2,
            // which the reaction-box maps to user-facing A > B > C
            // (A = y = bit 1, B = x = bit 0, C = z = bit 2).
            const TIE_BREAKER = Seniority3D.fromOrderIndex(2);

            // External offsets: which integer geometric offset each axis
            // sits at in the dyadic priority lattice. axisOffset(i) reads
            // the matching dropdown; axisExternalPri(i) returns pri() of
            // that offset.
            const AXIS_OFFSET_LETTERS = ["b", "a", "c"]; // 3D axis → letter
            function axisOffset(axis) {
                return parseInt(
                    document.getElementById(
                        AXIS_OFFSET_LETTERS[axis] + "Offset",
                    ).value,
                    10,
                );
            }
            function axisExternalPri(axis) {
                return pri(axisOffset(axis));
            }

            function tapeWidthForAxis(axis) {
                return TAPE_BASE + TAPE_PRI_INCREMENT * axisExternalPri(axis);
            }

            // Each tape splits into two half-length boxes — emitter-side
            // and receiver-side — so each half can render independently
            // based on the bit's value before/after the central cascade.
            // width is along axis+1, thickness along axis+2, so the three
            // tapes intersect orthogonally at the origin.
            function halfTapeDims(axis, width) {
                const dims = [0, 0, 0];
                dims[axis] = 1.0;
                dims[(axis + 1) % 3] = width;
                dims[(axis + 2) % 3] = TAPE_THICKNESS;
                return dims;
            }

            function makeHalfTape(axis, width, side) {
                const ramp = AXIS_RAMPS[axis];
                const [dx, dy, dz] = halfTapeDims(axis, width);
                const pos = [0, 0, 0];
                pos[axis] =
                    (side === "emitter" ? 0.5 : -0.5) * EMITTER_SIGN[axis];
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(dx, dy, dz),
                    new THREE.MeshBasicMaterial({
                        color: ramp.glow,
                        transparent: true,
                        opacity: 0.7,
                        side: THREE.DoubleSide,
                        depthWrite: false,
                    }),
                );
                mesh.position.set(...pos);
                mesh.visible = false;
                scene.add(mesh);
                return mesh;
            }

            const tapes = [];
            for (let axis = 0; axis < 3; axis++) {
                const w = tapeWidthForAxis(axis);
                tapes[axis] = {
                    emitter: makeHalfTape(axis, w, "emitter"),
                    receiver: makeHalfTape(axis, w, "receiver"),
                };
            }

            // Recreate each tape's box geometry to match the current
            // pri(offset) for its axis. Called on any A/B/C offset change.
            function rebuildTapeGeoms() {
                for (let axis = 0; axis < 3; axis++) {
                    const w = tapeWidthForAxis(axis);
                    const [dx, dy, dz] = halfTapeDims(axis, w);
                    for (const side of ["emitter", "receiver"]) {
                        tapes[axis][side].geometry.dispose();
                        tapes[axis][side].geometry = new THREE.BoxGeometry(
                            dx,
                            dy,
                            dz,
                        );
                    }
                }
            }

            // --- legend ---
            // 3D-axis order; the spec labels them B (x), A (y), C (z).
            const AXIS_DESCRIPTORS = [
                { letter: "B", axisName: "x" },
                { letter: "A", axisName: "y" },
                { letter: "C", axisName: "z" },
            ];

            function buildLegend() {
                const el = document.getElementById("legend");
                const items = [];
                for (let axis = 0; axis < 3; axis++) {
                    const { letter, axisName } = AXIS_DESCRIPTORS[axis];
                    const colorName = document.getElementById(
                        letter.toLowerCase() + "Color",
                    ).value;
                    const base = AXIS_RAMPS[axis].base;
                    const glow = AXIS_RAMPS[axis].glow;
                    const c1 = "#" + base.toString(16).padStart(6, "0");
                    const c2 = "#" + glow.toString(16).padStart(6, "0");
                    items.push(
                        `<span class="chip" style="background:${c1}"></span>` +
                            `<span class="chip" style="background:${c2}"></span>` +
                            `${letter} · ${axisName} · ${colorName}`,
                    );
                }
                el.innerHTML = items.join(" &nbsp; ");
            }
            buildLegend();

            // Walk every material that carries an axis color and
            // re-point it at the current ramp. Three.js picks up the
            // change on the next render — no scene rebuild needed.
            function applyAxisColors() {
                for (let axis = 0; axis < 3; axis++) {
                    const ramp = axisRamp(axis);
                    AXIS_RAMPS[axis] = ramp;
                    fatLineMats[axis].color.setHex(ramp.base);
                    emitters[axis].filled.material.color.setHex(ramp.base);
                    emitters[axis].outline.material.color.setHex(ramp.base);
                    receivers[axis].filled.material.color.setHex(ramp.base);
                    receivers[axis].outline.material.color.setHex(ramp.base);
                    tapes[axis].emitter.material.color.setHex(ramp.glow);
                    tapes[axis].receiver.material.color.setHex(ramp.glow);
                }
                buildLegend();
            }

            for (const letter of ["a", "b", "c"]) {
                document
                    .getElementById(letter + "Color")
                    .addEventListener("change", applyAxisColors);
            }

            // --- state ---
            const state = {
                emitter: [false, false, false],
            };

            function recompute() {
                const x =
                    (state.emitter[0] ? 1 : 0) |
                    (state.emitter[1] ? 2 : 0) |
                    (state.emitter[2] ? 4 : 0);
                // priority3's bit→letter convention: bit 0 = A, bit 1 = B,
                // bit 2 = C (internal to priority3). The reaction-box maps
                // 3D axes to those bits as 0=x, 1=y, 2=z, so the pri values
                // line up axisExternalPri(0..2) directly with priority3's
                // A/B/C arguments.
                const orderIndex = orderIndexFromPriorities(
                    axisExternalPri(0),
                    axisExternalPri(1),
                    axisExternalPri(2),
                    TIE_BREAKER,
                );
                const y = priority3(x, orderIndex);
                for (let axis = 0; axis < 3; axis++) {
                    const e = state.emitter[axis];
                    emitters[axis].filled.visible = e;
                    emitters[axis].outline.visible = !e;
                    const r = ((y >> axis) & 1) === 1;
                    receivers[axis].filled.visible = r;
                    receivers[axis].outline.visible = !r;
                    // Half-tape visibility follows each end's bit value: a
                    // bit XOR'd off at the central cascade leaves only its
                    // emitter-side half drawn, and vice versa.
                    tapes[axis].emitter.visible = e;
                    tapes[axis].receiver.visible = r;
                }
            }

            // --- input ---
            const raycaster = new THREE.Raycaster();
            const ndc = new THREE.Vector2();
            renderer.domElement.addEventListener("click", (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(ndc, camera);
                const targets = emitters.map((em) => em.filled);
                const hits = raycaster.intersectObjects(targets, false);
                if (!hits.length) return;
                const { axis } = hits[0].object.userData;
                state.emitter[axis] = !state.emitter[axis];
                recompute();
            });

            document
                .getElementById("resetBtn")
                .addEventListener("click", () => {
                    state.emitter = [false, false, false];
                    recompute();
                });

            for (const letter of ["a", "b", "c"]) {
                document
                    .getElementById(letter + "Offset")
                    .addEventListener("change", () => {
                        rebuildTapeGeoms();
                        recompute();
                    });
            }

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                for (const m of fatLineMats) {
                    m.resolution.set(window.innerWidth, window.innerHeight);
                }
            });

            recompute();

            // ----------------------------------------------------------
            // Planned: animate the three tapes in priority order — extend
            // each along its axis (or fade in) one after another, with a
            // speed slider analogous to cube-cuts.html's. Hook into
            // recompute() to start the animation from the current state.
            //
            // Planned: emitter ↔ receiver flip. Re-role the +axis discs
            // as emitters and the -axis discs as receivers; re-invoke
            // priority3 on the new emitter byte. Since the gate is its
            // own inverse, doing the flip and re-clicking the same bits
            // should recover the prior state — a visible reversibility
            // check.
            // ----------------------------------------------------------

            function loop() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }
            loop();
        </script>
    </body>
</html>
