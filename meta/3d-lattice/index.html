<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coylean Map Playground</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e1117;
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      max-width: 640px;
      padding: 2rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }
    p {
      color: #9aa3af;
      line-height: 1.6;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0 0;
    }
    li {
      margin: 0.5rem 0;
    }
    a {
      color: #6ea8ff;
      text-decoration: none;
      padding: 0.6rem 0.9rem;
      border: 1px solid #2a3140;
      border-radius: 6px;
      display: inline-block;
      transition: background 0.15s, border-color 0.15s;
    }
    a:hover {
      background: #1a2030;
      border-color: #3a4358;
    }
    a.back {
      color: #9aa3af;
      border: none;
      padding: 0;
      display: inline-block;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    a.back:hover {
      background: none;
      border: none;
      color: #c8d0dd;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../">&larr; Meta</a>
    <h1>Coylean Map Playground</h1>
    <p>A workspace for experimenting with Three.js renderings of coylean maps.</p>
    <ul>
      <li><a href="hello-world.html">Hello World &rarr;</a></li>
    </ul>
  </main>
</body>
</html>
