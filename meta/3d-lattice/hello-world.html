<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World &mdash; Coylean Map Playground</title>
  <link rel="stylesheet" href="src/hello-world.css" />
</head>
<body>
  <div id="app">
    <aside id="panel">
      <h2>Hello World</h2>
      <div class="crumb"><a href="index.html">&larr; back</a></div>

      <div class="control">
        <label>Cylinder radius <span id="radius-val">0.10</span></label>
        <input id="radius" type="range" min="0" max="0.3" step="0.01" value="0.1" />
      </div>

      <div class="control">
        <label><input id="wireframe" type="checkbox" /> Wireframe</label>
      </div>

      <div class="control">
        <div class="row">
          <button id="reset">Reset view</button>
        </div>
      </div>
    </aside>

    <div id="canvas-wrap">
      <canvas id="scene"></canvas>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="src/hello-world.js"></script>
</body>
</html>
