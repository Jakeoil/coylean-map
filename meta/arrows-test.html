<!doctype html>
<html lang="en">
    <head>
    <script type="importmap">
    {
      "imports": {
        "coylean/": "../src/",
        "coylean/core": "../src/core/coylean-core.js",
        "coylean/glyphs": "../src/glyphs/glyph-core.js",
        "coylean/ui/render": "../src/ui/glyph-render.js"
      }
    }
    </script>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Coylean Arrow Thickness Tester</title>
        <link rel="icon" type="image/png" href="../map-icon.png" />
        <link rel="stylesheet" href="../coylean-explorer/prototype.css" />
        <style>
            #gallery {
                width: 100%;
                height: 100%;
                display: block;
                background: #fff;
            }

            .preset-card {
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 8px 10px;
                margin-bottom: 8px;
                background: #fafafa;
            }
            .preset-card h3 {
                font-size: 0.85em;
                margin-bottom: 6px;
                color: #444;
            }
            .preset-card .control input {
                width: 56px;
            }

            .out {
                font-family: monospace;
                font-size: 0.75em;
                white-space: pre;
                background: #f0f0f0;
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 8px;
                color: #333;
                max-height: 220px;
                overflow: auto;
            }

            .specimen-label {
                font-family: system-ui;
                font-size: 14px;
                font-weight: 600;
                fill: #444;
                text-anchor: middle;
            }
            .specimen-frame {
                fill: #fff;
                stroke: #9a4a4a;
                stroke-width: 1.5;
            }
            .specimen-frame.right {
                stroke: #5a8aaa;
            }
            .specimen-arrow.down {
                fill: #7a2d2d;
            }
            .specimen-arrow.right {
                fill: #3d6a8a;
            }
        </style>
    </head>
    <body class="layout-sidebar">
        <nav class="breadcrumb">
            <a href="index.html">Meta</a>
            <span class="sep">›</span>
            <a href="arrows-test.html" class="current">Arrow Thickness</a>
        </nav>
        <div class="layout-body">
            <div class="sidebar" style="min-width: 280px;">
                <h1>Arrow Thickness</h1>

                <h2>Specimen</h2>
                <div class="toggle-row">
                    <button id="dir-down" class="active">Down</button>
                    <button id="dir-right">Right</button>
                </div>
                <div class="toggle-row" style="margin-top: 6px;">
                    <button id="form-single" class="active">Single-headed</button>
                    <button id="form-double">Double-headed</button>
                </div>
                <div class="toggle-row" style="margin-top: 6px;">
                    <button id="mode-full" class="active">Full arrow</button>
                    <button id="mode-line">Line only</button>
                </div>

                <h2>Shared</h2>
                <div class="control-row">
                    <div class="control">
                        <label>diamond D</label>
                        <input type="number" id="diamondD" value="60" step="2" />
                    </div>
                </div>

                <h2>Presets</h2>
                <div style="font-size: 0.78em; color: #666; margin-bottom: 6px;">
                    MARGIN per preset; default = SW · √2 (cap tangent to diamond edges).
                    Hint shows current state: <span style="color:#16a34a;">tangent</span> /
                    <span style="color:#9a4a4a;">out</span> (cap sticks out) /
                    <span style="color:#5a8aaa;">in</span> (cap pulled inside).
                </div>
                <div id="preset-controls"></div>

                <h2>Export</h2>
                <div class="toggle-row">
                    <button id="copy-btn" class="btn">Copy presets JSON</button>
                    <button id="reset-btn" class="btn">Reset to defaults</button>
                </div>
                <div id="json-out" class="out" style="margin-top: 8px;"></div>
            </div>

            <div class="main">
                <svg id="gallery"></svg>
            </div>
        </div>

        <script type="module">
            import { init } from "../coylean-explorer/src/app/arrows-test-page.js";
            init();
        </script>
    </body>
</html>
