<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Big Map — Explore</title>
<style>
  html, body { margin: 0; height: 100%; background: #f8f8fb;
               font: 13px/1.4 system-ui, sans-serif; color: #222; }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab;
           image-rendering: pixelated; background: #fff; }
  canvas.dragging { cursor: grabbing; }
  #hud { position: fixed; top: 8px; left: 8px; max-width: 360px;
         background: rgba(255,255,255,0.92); padding: 8px 10px;
         border: 1px solid #ccd; border-radius: 6px;
         font: 12px ui-monospace, Menlo, monospace; color: #234;
         box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  #hud h2 { font: 600 12px system-ui; margin: 0 0 4px; color: #345; }
  #hud .row { margin: 2px 0; }
  #hud .k { color: #678; }
  #controls { position: fixed; bottom: 8px; left: 8px;
              background: rgba(255,255,255,0.92); padding: 8px 10px;
              border: 1px solid #ccd; border-radius: 6px;
              font: 12px system-ui; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  #controls label { display: inline-flex; gap: 0.3em; align-items: center;
                    margin-right: 0.8em; }
  #controls input[type=number] { width: 5em; font: inherit; padding: 1px 4px; }
  #controls button { padding: 2px 8px; font: inherit; cursor: pointer;
                     border: 1px solid #889; background: #f1f3fa;
                     border-radius: 3px; }
  #controls button:hover { background: #e3e7f1; }
  #nav { position: fixed; top: 8px; right: 8px;
         background: rgba(255,255,255,0.92); padding: 6px 9px;
         border: 1px solid #ccd; border-radius: 6px;
         font: 12px system-ui; }
  #nav a { color: #336; }
  #help { position: fixed; bottom: 8px; right: 8px; max-width: 280px;
          background: rgba(255,255,255,0.92); padding: 8px 10px;
          border: 1px solid #ccd; border-radius: 6px;
          font: 11.5px/1.4 system-ui; color: #345; }
  #help kbd { font: inherit; background: #eef; border: 1px solid #aab;
              border-bottom-width: 2px; border-radius: 3px;
              padding: 0 0.3em; font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>

<div id="stage"><canvas id="cv"></canvas></div>

<div id="hud">
  <h2 id="hudTitle">building…</h2>
  <div class="row"><span class="k">view:</span> <span id="viewBounds">—</span></div>
  <div class="row"><span class="k">cell px:</span> <span id="cellPx">—</span></div>
  <div class="row"><span class="k">mode:</span> <span id="mode">—</span></div>
  <div class="row"><span class="k">tile cache:</span> <span id="cacheSize">0</span></div>
  <div class="row"><span class="k">extent:</span> <span id="extent">—</span></div>
  <div class="row"><span class="k">frame:</span> <span id="frameTime">—</span></div>
</div>

<div id="controls">
  <label title="initial scaffold size — universe grows past this as you pan">
    initial&nbsp;L <input id="L" type="number" min="4" step="1" value="1024">
  </label>
  <label>K <input id="K" type="number" min="2" step="1" value="256"></label>
  <label>maxPri <input id="maxPri" type="number" placeholder="auto"></label>
  <button id="rebuild">Reset scaffold</button>
  <button id="recenter">Recenter</button>
  <label><input id="showGrid" type="checkbox" checked> dyadic grid</label>
  <label><input id="showLabels" type="checkbox" checked> labels</label>
</div>

<div id="nav">
  <a href="../">Meta</a> ·
  <a href="index.html">index</a> ·
  <a href="explain.html">explain</a>
</div>

<div id="help">
  <strong>drag</strong> to pan ·
  <strong>wheel</strong> to zoom (anchored at cursor) ·
  <kbd>0</kbd> recenter · <kbd>+</kbd>/<kbd>-</kbd> zoom · <kbd>g</kbd> grid
  <br><span style="color:#789">universe grows southeast as you pan
  past the current extent</span>
</div>

<script type="module">
import { Propagation, pri } from "../../coylean-explorer/coylean-core.js";
import { buildScaffold, extendScaffold } from "./scaffold.mjs";
import { tile } from "./tile.mjs";
import {
    makeTileBitmap, drawArrowsVector,
    drawDyadicGrid, drawDyadicLabels, autoMaxPri,
} from "./render.mjs";

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d", { alpha: false });

let scaffold = null;
let tileCache = new Map();
let propCache = new Map();

const view = {
    cellX: 0,
    cellY: 0,
    cellPx: 4,
};

const PROP_CACHE_LIMIT = 64;
const TILE_CACHE_LIMIT = 256;

function $(id) { return document.getElementById(id); }
function ms(t) { return `${t.toFixed(1)} ms`; }

function resizeCanvas() {
    const r = window.devicePixelRatio || 1;
    cv.width = Math.floor(window.innerWidth * r);
    cv.height = Math.floor(window.innerHeight * r);
    cv.style.width = `${window.innerWidth}px`;
    cv.style.height = `${window.innerHeight}px`;
    ctx.setTransform(r, 0, 0, r, 0, 0);
    schedule();
}

function readParams() {
    const L = Number($("L").value);
    const K = Number($("K").value);
    const mp = $("maxPri").value.trim();
    const maxPri = mp ? Number(mp) : autoMaxPri(L);
    if (!Number.isInteger(L) || L < 2) throw new Error("L must be ≥ 2");
    if (!Number.isInteger(K) || K < 1) throw new Error("K must be ≥ 1");
    if (L % K !== 0) throw new Error(`L=${L} must be divisible by K=${K}`);
    return { L, K, maxPri };
}

async function build() {
    let params;
    try {
        params = readParams();
    } catch (e) {
        $("hudTitle").textContent = `ERROR: ${e.message}`;
        return;
    }
    const { L, K, maxPri } = params;
    $("hudTitle").textContent = `building scaffold L=${L} K=${K}…`;
    $("rebuild").disabled = true;
    await new Promise((r) => requestAnimationFrame(r));
    const t0 = performance.now();
    scaffold = buildScaffold({ L, K, maxPri });
    const dt = performance.now() - t0;
    tileCache = new Map();
    propCache = new Map();
    $("hudTitle").textContent =
        `L=${L}, K=${K}, blocks=${scaffold.nBlocks}², built ${ms(dt)}`;
    $("rebuild").disabled = false;
    recenter(false);
}

function recenter(redraw = true) {
    if (!scaffold) return;
    const { L } = scaffold;
    const w = cv.width / (window.devicePixelRatio || 1);
    const h = cv.height / (window.devicePixelRatio || 1);
    const target = Math.min(L, 1024);
    view.cellPx = Math.min(w, h) / target;
    view.cellX = 0;
    view.cellY = 0;
    if (redraw) schedule();
}

function getPropagation(k1, k2) {
    const key = `${k1},${k2}`;
    let p = propCache.get(key);
    if (p) {
        propCache.delete(key);
        propCache.set(key, p);
        return p;
    }
    p = tile(scaffold, k1, k2);
    propCache.set(key, p);
    if (propCache.size > PROP_CACHE_LIMIT) {
        const firstKey = propCache.keys().next().value;
        propCache.delete(firstKey);
    }
    return p;
}

function getTileBitmap(k1, k2) {
    const key = `${k1},${k2}`;
    let bmp = tileCache.get(key);
    if (bmp) {
        tileCache.delete(key);
        tileCache.set(key, bmp);
        return bmp;
    }
    const p = getPropagation(k1, k2);
    bmp = makeTileBitmap(p, scaffold.K);
    tileCache.set(key, bmp);
    if (tileCache.size > TILE_CACHE_LIMIT) {
        const firstKey = tileCache.keys().next().value;
        tileCache.delete(firstKey);
    }
    return bmp;
}

let scheduled = false;
function schedule() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => {
        scheduled = false;
        render();
    });
}

function render() {
    const t0 = performance.now();
    const W = cv.width / (window.devicePixelRatio || 1);
    const H = cv.height / (window.devicePixelRatio || 1);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, W, H);

    if (!scaffold) return;
    const { K } = scaffold;
    const { cellX, cellY, cellPx } = view;

    const iMin = Math.max(0, Math.floor(cellX));
    const iMax = Math.max(iMin, Math.ceil(cellX + W / cellPx));
    const jMin = Math.max(0, Math.floor(cellY));
    const jMax = Math.max(jMin, Math.ceil(cellY + H / cellPx));

    const k1Min = Math.floor(jMin / K);
    const k1Max = Math.floor(jMax / K);
    const k2Min = Math.floor(iMin / K);
    const k2Max = Math.floor(iMax / K);

    const needN = Math.max(k1Max, k2Max) + 1;
    let extendMs = 0;
    if (needN > scaffold.nBlocks) {
        const tx0 = performance.now();
        extendScaffold(scaffold, needN);
        extendMs = performance.now() - tx0;
    }

    const useVector = cellPx >= 2.5;

    ctx.imageSmoothingEnabled = cellPx < 1.5;
    ctx.imageSmoothingQuality = "low";

    if (useVector) {
        const fade = Math.max(0, Math.min(1, (cellPx - 2.5) / 3));
        for (let k1 = k1Min; k1 <= k1Max; k1++) {
            for (let k2 = k2Min; k2 <= k2Max; k2++) {
                const p = getPropagation(k1, k2);
                const x0 = (k2 * K - cellX) * cellPx;
                const y0 = (k1 * K - cellY) * cellPx;
                drawArrowsVector(ctx, p, x0, y0, cellPx, {
                    strokeStyle: `rgba(30,30,40,${0.55 + 0.35 * fade})`,
                });
            }
        }
    } else {
        for (let k1 = k1Min; k1 <= k1Max; k1++) {
            for (let k2 = k2Min; k2 <= k2Max; k2++) {
                const bmp = getTileBitmap(k1, k2);
                const x = (k2 * K - cellX) * cellPx;
                const y = (k1 * K - cellY) * cellPx;
                const sz = K * cellPx;
                ctx.drawImage(bmp, x, y, sz, sz);
            }
        }
    }

    if ($("showGrid").checked) {
        drawDyadicGrid(ctx, {
            canvas: { width: W, height: H },
            viewCellX: cellX, viewCellY: cellY, cellPx,
            hInitCol0: scaffold.hInitCol0,
            vInitRow0: scaffold.vInitRow0,
            maxPri: scaffold.maxPri,
            minPri: 2,
        });
    }
    if ($("showLabels").checked && cellPx >= 0.5) {
        drawDyadicLabels(ctx, {
            canvas: { width: W, height: H },
            viewCellX: cellX, viewCellY: cellY, cellPx,
            hInitCol0: scaffold.hInitCol0,
            vInitRow0: scaffold.vInitRow0,
            maxPri: scaffold.maxPri,
            labelMinPri: cellPx >= 2 ? 3 : 5,
        });
    }

    $("viewBounds").textContent =
        `[${iMin}..${iMax}] × [${jMin}..${jMax}]`;
    $("cellPx").textContent = cellPx.toFixed(2);
    $("mode").textContent = useVector ? "vector" : "bitmap";
    $("cacheSize").textContent =
        `${tileCache.size} bmp · ${propCache.size} prop`;
    $("extent").textContent =
        `${scaffold.nBlocks}² blocks · L=${scaffold.L}`
        + (extendMs > 0 ? `  (+${ms(extendMs)})` : "");
    const dt = performance.now() - t0;
    $("frameTime").textContent = ms(dt);
}

let dragging = false;
let lastX = 0;
let lastY = 0;
cv.addEventListener("pointerdown", (e) => {
    dragging = true;
    cv.classList.add("dragging");
    cv.setPointerCapture(e.pointerId);
    lastX = e.clientX;
    lastY = e.clientY;
});
cv.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    view.cellX -= dx / view.cellPx;
    view.cellY -= dy / view.cellPx;
    schedule();
});
cv.addEventListener("pointerup", (e) => {
    dragging = false;
    cv.classList.remove("dragging");
    cv.releasePointerCapture(e.pointerId);
});
cv.addEventListener("pointercancel", () => {
    dragging = false;
    cv.classList.remove("dragging");
});

cv.addEventListener("wheel", (e) => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.0015);
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const wx = view.cellX + mx / view.cellPx;
    const wy = view.cellY + my / view.cellPx;
    view.cellPx = Math.max(0.1, Math.min(64, view.cellPx * factor));
    view.cellX = wx - mx / view.cellPx;
    view.cellY = wy - my / view.cellPx;
    schedule();
}, { passive: false });

window.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "0") { recenter(); }
    else if (e.key === "+" || e.key === "=") {
        view.cellPx = Math.min(64, view.cellPx * 1.4);
        schedule();
    } else if (e.key === "-" || e.key === "_") {
        view.cellPx = Math.max(0.1, view.cellPx / 1.4);
        schedule();
    } else if (e.key === "g") {
        $("showGrid").checked = !$("showGrid").checked;
        schedule();
    }
});

window.addEventListener("resize", resizeCanvas);
$("rebuild").addEventListener("click", build);
$("recenter").addEventListener("click", () => recenter());
$("showGrid").addEventListener("change", schedule);
$("showLabels").addEventListener("change", schedule);

resizeCanvas();
build();
</script>

</body>
</html>
