<!doctype html>
<html lang="en">
    <head>
    <script type="importmap">
    {
      "imports": {
        "coylean/": "../../src/",
        "coylean/core": "../../src/core/coylean-core.js",
        "coylean/glyphs": "../../src/glyphs/glyph-core.js",
        "coylean/ui/render": "../../src/ui/glyph-render.js"
      }
    }
    </script>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>planet-coyleus · terrains</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            /* Light theme is the default; body.dark overrides the variables. */
            :root {
                --bg: #eceef2;
                --panel: #ffffff;
                --panel-2: #f1f3f6;
                --border: #d6d9df;
                --border-2: #c6cad2;
                --border-hover: #aab0bd;
                --ink: #23272f;
                --field-ink: #23272f;
                --muted: #6b7280;
                --muted-2: #7c8494;
                --accent: #b07d12;
                --chip-ink: #3a3f4a;
                --tag-ink: #11141a;
                --tag-halo: #ffffff;
            }
            body.dark {
                --bg: #0b0c10;
                --panel: #14161c;
                --panel-2: #1b1e25;
                --border: #23262f;
                --border-2: #2b2f39;
                --border-hover: #3a3f4d;
                --ink: #c9ccd3;
                --field-ink: #d4d7de;
                --muted: #6b7280;
                --muted-2: #7c8494;
                --accent: #d8b56a;
                --chip-ink: #c2c6cf;
                --tag-ink: #e6e8ee;
                --tag-halo: #000000;
            }
            body {
                font-family: Menlo, Monaco, "Courier New", monospace;
                background: var(--bg);
                color: var(--ink);
                padding: 16px 20px;
            }
            h1 {
                font-size: 1.3rem;
                margin-bottom: 12px;
                color: var(--ink);
            }
            .breadcrumb {
                font-size: 0.8rem;
                color: var(--muted);
                margin-bottom: 10px;
            }
            .breadcrumb a {
                color: var(--accent);
                text-decoration: none;
            }
            .breadcrumb a:hover {
                text-decoration: underline;
            }
            .layout {
                display: flex;
                gap: 18px;
                align-items: flex-start;
            }
            .panel {
                flex: 0 0 268px;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 14px;
                max-height: calc(100vh - 96px);
                overflow-y: auto;
            }
            .panel h2,
            .stage h2 {
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--muted-2);
                margin: 14px 0 8px;
            }
            .panel h2:first-child {
                margin-top: 0;
            }
            .stage {
                flex: 1 1 auto;
                min-width: 0;
            }

            /* theme toggle */
            .theme-row {
                display: flex;
                align-items: center;
                gap: 7px;
                margin-bottom: 12px;
                font-size: 0.74rem;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }
            .theme-row input {
                cursor: pointer;
            }

            .map-controls {
                display: flex;
                gap: 16px;
                margin: 6px 0;
            }
            .map-toggle {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 0.74rem;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }
            .map-toggle input {
                cursor: pointer;
            }

            /* orientation control (anchor quadrant + seniority) */
            #orient .orient-btns {
                display: flex;
                gap: 6px;
                margin-bottom: 8px;
            }
            #orient .orient-btn {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                background: var(--panel-2);
                border: 1px solid var(--border-2);
                color: var(--ink);
                border-radius: 6px;
                padding: 8px 4px;
                font-family: inherit;
                cursor: pointer;
            }
            #orient .orient-btn .osym {
                font-size: 1.7rem;
                font-weight: 700;
                line-height: 1;
            }
            #orient .orient-btn .oval {
                font-size: 1rem;
                font-weight: 600;
                color: var(--muted);
            }
            #orient .orient-btn:hover {
                background: var(--border);
                border-color: var(--border-hover);
            }
            #orient .orient-label {
                font-size: 1.2rem;
                color: var(--accent);
                text-align: center;
                letter-spacing: 0.04em;
            }

            /* glyph palette */
            #palette {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .swatch {
                position: relative;
                cursor: pointer;
                border: 2px solid var(--border);
                border-radius: 5px;
                padding: 2px;
                line-height: 0;
            }
            .swatch.on {
                border-color: var(--accent);
            }
            .swatch canvas {
                width: 100%;
                height: auto;
                display: block;
                border-radius: 3px;
            }
            .swatch-tag {
                position: absolute;
                top: 1px;
                left: 3px;
                font-size: 0.62rem;
                color: var(--tag-ink);
                text-shadow: 0 0 3px var(--tag-halo), 0 0 3px var(--tag-halo);
                line-height: 1;
            }

            /* color tray */
            .ramp {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 5px;
            }
            .ramp-name {
                flex: 0 0 64px;
                font-size: 0.72rem;
                color: var(--muted);
            }
            .ramp-strip {
                display: flex;
                gap: 3px;
            }
            .chip {
                width: 26px;
                height: 20px;
                border: 2px solid transparent;
                border-radius: 4px;
                cursor: pointer;
                padding: 0;
            }
            .chip.on {
                border-color: var(--ink);
            }
            .pal-switch {
                display: flex;
                gap: 6px;
                margin-bottom: 8px;
            }
            .pal-switch .chip.act.on {
                background: var(--border);
                border-color: var(--ink);
                color: var(--ink);
            }
            .actions {
                display: flex;
                gap: 6px;
                margin-top: 8px;
            }
            .chip.act {
                width: auto;
                padding: 3px 12px;
                background: var(--panel-2);
                border: 1px solid var(--border-2);
                color: var(--chip-ink);
                font-size: 0.72rem;
                font-family: inherit;
            }
            .chip.act:hover {
                background: var(--border);
            }

            /* IO */
            #io input[type="text"] {
                width: 100%;
                background: var(--panel-2);
                border: 1px solid var(--border-2);
                color: var(--field-ink);
                border-radius: 4px;
                padding: 5px 7px;
                font-family: inherit;
                font-size: 0.75rem;
                margin-bottom: 7px;
            }
            #io button,
            #io label {
                display: inline-block;
                background: var(--panel-2);
                border: 1px solid var(--border-2);
                color: var(--ink);
                border-radius: 4px;
                padding: 5px 10px;
                font-family: inherit;
                font-size: 0.72rem;
                cursor: pointer;
                margin: 0 4px 4px 0;
            }
            #io input[type="file"] {
                display: none;
            }

            /* floating editor panel */
            #editor-panel {
                position: fixed;
                z-index: 50;
                width: 400px;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 8px;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            }
            #editor-panel[hidden] {
                display: none;
            }
            #editor-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                padding: 6px 6px 6px 12px;
                cursor: move;
                user-select: none;
                background: var(--panel-2);
                border-bottom: 1px solid var(--border);
                border-radius: 8px 8px 0 0;
            }
            #editor-bar #focus-label {
                color: var(--accent);
                font-size: 0.82rem;
            }
            .editor-controls {
                display: flex;
                gap: 2px;
            }
            .editor-controls button {
                background: transparent;
                border: none;
                color: var(--muted);
                cursor: pointer;
                font-size: 0.9rem;
                font-family: inherit;
                line-height: 1;
                padding: 3px 7px;
                border-radius: 4px;
            }
            .editor-controls button:hover {
                background: var(--border);
                color: var(--ink);
            }
            #editor-body {
                padding: 12px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                min-height: 430px;
            }
            #editor-bar #focus-label {
                font-variant-numeric: tabular-nums;
            }
            #editor-body .relatives {
                width: 100%;
                justify-content: center;
            }
            #editor-body .rel-group h2 {
                margin: 0 0 6px;
                text-align: center;
            }
            #editor-panel.collapsed #editor-body {
                display: none;
            }
            #focus canvas {
                border: 1px solid var(--border-2);
                border-radius: 4px;
                cursor: crosshair;
                image-rendering: pixelated;
            }
            .relatives {
                display: flex;
                gap: 22px;
            }
            #subs canvas,
            #trans canvas {
                border: 1px solid var(--border-2);
                border-radius: 3px;
                cursor: crosshair;
                image-rendering: pixelated;
            }
            #order {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }
            .rung-btn {
                background: var(--panel-2);
                border: 1px solid var(--border-2);
                color: var(--chip-ink);
                border-radius: 5px;
                padding: 5px 0;
                font-family: inherit;
                font-size: 0.74rem;
                cursor: pointer;
            }
            .rung-btn:hover {
                background: var(--border);
            }
            .rung-btn.on {
                border-color: var(--accent);
                color: var(--accent);
            }
            .hud {
                font-size: 0.72rem;
                color: var(--muted);
                margin-bottom: 6px;
                min-height: 1em;
                font-variant-numeric: tabular-nums;
            }
            #quadrant {
                border: 1px solid var(--border-2);
                border-radius: 6px;
                cursor: crosshair;
                display: block;
                width: 700px;
                height: 700px;
                max-width: 100%;
                touch-action: none;
                background: var(--panel);
            }
            .hint {
                font-size: 0.72rem;
                color: var(--muted);
                margin: 4px 0 10px;
            }
        </style>
    </head>
    <body>
        <div class="breadcrumb">
            <a href="../index.html">meta</a> /
            <a href="./index.html">planet-coyleus</a> / terrains
        </div>
        <h1>planet-coyleus · terrains</h1>

        <div class="layout">
            <aside class="panel">
                <label class="theme-row">
                    <input type="checkbox" id="theme-toggle" />
                    Dark mode
                </label>

                <h2>Orientation — anchor &amp; seniority</h2>
                <div id="orient"></div>

                <h2>Glyphs</h2>
                <div id="palette"></div>

                <h2>Paint</h2>
                <div id="colors"></div>

                <h2>Order — V/H ladder</h2>
                <div id="order"></div>

                <h2>Scheme</h2>
                <div id="io">
                    <select id="scheme-preset">
                        <option value="">— load preset —</option>
                        <option value="color-assignments-II.json">Themes II</option>
                        <option value="color-assignments-III.json">
                            Themes III · berry wide-gamut
                        </option>
                        <option value="color-assignments-IV.json">
                            Themes IV · II de-duplicated (terrain)
                        </option>
                    </select>
                    <input
                        type="text"
                        id="scheme-name"
                        value="first-terrain"
                        placeholder="scheme name"
                    />
                    <button id="save">save json</button>
                    <label for="load">load json</label>
                    <input type="file" id="load" accept="application/json" />
                    <button id="clear-all">clear all</button>
                </div>
            </aside>

            <main class="stage">
                <h2>Quadrant</h2>
                <div class="hint">
                    scroll to zoom (walks the V/H ladder) · drag to pan · click a
                    glyph to edit it
                </div>
                <div class="map-controls">
                    <label class="map-toggle" title="Overlay a black transparent baby-block letter on each glyph">
                        <input type="checkbox" id="glyphs-toggle" />
                        show glyphs
                    </label>
                    <label class="map-toggle" title="Draw cells in √2 (silver ratio) proportions: V landscape, H portrait — the V/H ladder is the silver-ratio fold">
                        <input type="checkbox" id="silver-toggle" />
                        silver ratio
                    </label>
                </div>
                <div id="map-hud" class="hud"></div>
                <canvas id="quadrant" width="760" height="760"></canvas>
            </main>
        </div>

        <!-- floating, draggable editor: parent glyph + substitution + translation -->
        <div id="editor-panel" hidden>
            <div id="editor-bar">
                <span id="focus-label"></span>
                <span class="editor-controls">
                    <button id="editor-collapse" type="button" title="collapse">
                        ▾
                    </button>
                    <button id="editor-close" type="button" title="close">×</button>
                </span>
            </div>
            <div id="editor-body">
                <div id="focus"></div>
                <div class="relatives">
                    <div class="rel-group">
                        <h2 id="subs-h2">Substitution · v→h (left | right)</h2>
                        <div id="subs"></div>
                    </div>
                    <div class="rel-group">
                        <h2 id="trans-h2">Translation · 4→1 (square + bars)</h2>
                        <div id="trans"></div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="./terrains.mjs"></script>
    </body>
</html>
