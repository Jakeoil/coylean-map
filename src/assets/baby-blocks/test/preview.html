<!doctype html>
<html lang="en">
<head>
    <script type="importmap">
    {
      "imports": {
        "coylean/": "../../../../src/",
        "coylean/core": "../../../../src/core/coylean-core.js",
        "coylean/glyphs": "../../../../src/glyphs/glyph-core.js",
        "coylean/ui/render": "../../../../src/ui/glyph-render.js"
      }
    }
    </script>

    <meta charset="UTF-8" />
    <title>Baby Blocks — complete set preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Menlo, Monaco, "Courier New", monospace;
            background: #fff; color: #222; padding: 24px;
        }
        .breadcrumb { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        .breadcrumb a { color: #555; text-decoration: none; }
        h1 { font-size: 1.5rem; margin-bottom: 6px; }
        p.lede { color: #555; font-size: 0.9rem; margin-bottom: 16px; max-width: 720px; }
        .controls { margin-bottom: 16px; font-size: 0.85rem; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .cell { text-align: center; }
        .cell .lab { font-size: 0.7rem; color: #999; margin-top: 2px; }
        svg { display: block; }
    </style>
</head>
<body>
    <div class="breadcrumb"><a href="../../">Coylean Map</a> / <a href="../">Baby Blocks</a> / test</div>
    <h1>Complete set — AlphabetBlocks-complete.svg</h1>
    <p class="lede">All 95 printable ASCII blocks generated from News 706 Bold,
        rendered through <code>baby-blocks.js</code> exactly as the app would.
        Each glyph uses the transform calibrated from the original 36.</p>
    <div class="controls">
        <label>Size:
            <select id="size">
                <option value="48">48</option>
                <option value="64" selected>64</option>
                <option value="96">96</option>
            </select>
        </label>
        <label><input type="checkbox" id="outline" checked /> Frame</label>
        <label><input type="checkbox" id="override" /> Override color</label>
        <input type="color" id="color" value="#222222" />
    </div>
    <div class="grid" id="grid"></div>
    <script type="module" src="./preview.mjs"></script>
</body>
</html>
